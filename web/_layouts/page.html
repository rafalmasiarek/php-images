<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title }} · {{ site.title }}</title>
    <meta name="description" content="{{ site.description | escape }}" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/site.css" />
  </head>
  <body>
    {% include header.html %}

    <main class="container">
      <header class="page-head">
        <h1>{{ page.title }}</h1>
        {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
      </header>

      <article class="content">
        {{ content }}
      </article>
    </main>

    {% include footer.html %}
  </body>
</html>
