report:
  status_labels:
    passed: PASS
    failed: FAIL

checks:
  - name: phpctl version exits successfully
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl version'
    expect:
      code: 0
      stdout:
        - op: contains
          value: "phpctl"

  - name: phpctl info returns valid json
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl --output json info'
    parser: json
    expect:
      code: 0
      json:
        - path: php_version
          op: exists
        - path: php_sapi
          op: exists
        - path: php_bin
          op: exists
        - path: loaded_ini
          op: exists
        - path: ini_scan_dir
          op: exists
        - path: extension_dir
          op: exists

  - name: php version matches expected branch
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl --output json info'
    parser: json
    expect:
      code: 0
      json:
        - path: php_version
          op: startswith
          value: "${PHP_MM}."

  - name: phpctl ext versions returns valid json
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl --output json ext versions'
    parser: json
    expect:
      code: 0

  - name: php binary reports expected branch
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'php -v'
    expect:
      code: 0
      stdout:
        - op: contains
          value: "PHP ${PHP_MM}."

  - name: php module list works
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'php -m'
    expect:
      code: 0
      stdout:
        - op: contains
          value: "Core"

  - name: alpine release is present
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'cat /etc/alpine-release'
    expect:
      code: 0
      stdout:
        - op: regex
          value: '^[0-9]+\.[0-9]+(\.[0-9]+)?$'
