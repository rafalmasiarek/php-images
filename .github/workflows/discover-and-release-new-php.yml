name: discover-and-release-new-php

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "How many new minor versions to propose per run (default 1)"
        required: false
        default: "1"

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Discover next PHP X.Y with required variants (stable X.Y.Z-*-alpine*)
        id: discover
        shell: bash
        env:
          LIMIT: ${{ github.event.inputs.limit || '1' }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json, os, re, shutil, sys
          from pathlib import Path
          from urllib.request import Request, urlopen

          ROOT = Path(".")
          VERSIONS_DIR = ROOT / "versions"

          try:
            LIMIT = int(os.environ.get("LIMIT", "1") or "1")
          except Exception:
            LIMIT = 1
          LIMIT = max(LIMIT, 1)

          def http_get_json(url: str, headers: dict | None = None) -> dict:
            req = Request(url, headers=headers or {})
            with urlopen(req, timeout=30) as r:
              return json.loads(r.read().decode("utf-8"))

          def mm_key(s: str):
            return tuple(int(x) for x in s.split("."))

          def alpine_key(tag: str) -> tuple:
            m = re.search(r"-alpine(\d+(?:\.\d+)*)", tag)
            if not m:
              return (0,)
            return tuple(int(x) for x in m.group(1).split("."))

          def variants_for_php(mm: str) -> list[str]:
            php_dir = VERSIONS_DIR / mm
            if not php_dir.exists():
              return []

            variants = []
            for p in sorted(php_dir.iterdir()):
              if p.is_dir() and (p / "Dockerfile").exists():
                variants.append(p.name)
            return variants

          existing_mm: list[str] = []
          if VERSIONS_DIR.exists():
            for p in VERSIONS_DIR.iterdir():
              if p.is_dir() and re.match(r"^\d+\.\d+$", p.name):
                existing_mm.append(p.name)

          if not existing_mm:
            print("No existing versions/* to copy from. Create a template first.")
            sys.exit(1)

          existing_mm = sorted(existing_mm, key=mm_key)
          base_mm = existing_mm[-1]
          base_dir = VERSIONS_DIR / base_mm

          REQUIRED_VARIANTS = variants_for_php(base_mm)
          if not REQUIRED_VARIANTS:
            print(f"No variants with Dockerfile found in versions/{base_mm}")
            sys.exit(1)

          missing = [v for v in REQUIRED_VARIANTS if not (base_dir / v / "Dockerfile").exists()]
          if missing:
            print(f"Base {base_mm} missing Dockerfile(s) for variants: {', '.join(missing)}")
            sys.exit(1)

          token = http_get_json(
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:library/php:pull"
          )["token"]

          def fetch_all_tags() -> list[str]:
            tags: list[str] = []
            last: str | None = None
            n = 1000

            while True:
              url = f"https://registry-1.docker.io/v2/library/php/tags/list?n={n}"
              if last:
                url += f"&last={last}"

              req = Request(url, headers={"Authorization": f"Bearer {token}"})
              with urlopen(req, timeout=30) as r:
                data = json.loads(r.read().decode("utf-8"))
                chunk = data.get("tags") or []
                if not chunk:
                  break

                tags.extend(chunk)

                link = r.headers.get("Link", "") or ""
                if 'rel="next"' not in link:
                  break

                last = chunk[-1]

            return sorted(set(tags))

          tags = fetch_all_tags()
          if not tags:
            print("No tags returned from registry, abort.")
            sys.exit(1)

          variant_alt = "|".join(re.escape(v) for v in REQUIRED_VARIANTS)
          tag_re = re.compile(
            rf"^(?P<mm>\d+\.\d+)\.(?P<patch>\d+)-(?P<variant>{variant_alt})-(?P<alpine>alpine.*)$"
          )

          candidates: dict[str, dict[str, list[tuple[int, tuple, str]]]] = {}

          for t in tags:
            m = tag_re.match(t)
            if not m:
              continue
            mm = m.group("mm")
            var = m.group("variant")
            patch = int(m.group("patch"))
            ak = alpine_key(t)
            candidates.setdefault(mm, {}).setdefault(var, []).append((patch, ak, t))

          def best_full_tag(mm: str, variant: str) -> str | None:
            lst = candidates.get(mm, {}).get(variant, [])
            if not lst:
              return None
            lst_sorted = sorted(lst, key=lambda x: (x[0], x[1], x[2]), reverse=True)
            return lst_sorted[0][2]

          upstream_mm = sorted(
            [mm for mm in candidates.keys() if all(best_full_tag(mm, v) for v in REQUIRED_VARIANTS)],
            key=mm_key,
          )

          if not upstream_mm:
            print(
              "No upstream X.Y found with required variants "
              f"{sorted(REQUIRED_VARIANTS)} (stable X.Y.Z-<variant>-alpine*)."
            )
            out = os.environ["GITHUB_OUTPUT"]
            with open(out, "a", encoding="utf-8") as fh:
              fh.write("new_php=\n")
              fh.write("base_php=\n")
            sys.exit(0)

          newer = [mm for mm in upstream_mm if mm_key(mm) > mm_key(base_mm)]
          if not newer:
            print(f"No newer versions than {base_mm}.")
            out = os.environ["GITHUB_OUTPUT"]
            with open(out, "a", encoding="utf-8") as fh:
              fh.write("new_php=\n")
              fh.write("base_php=\n")
            sys.exit(0)

          chosen_mms = sorted(newer, key=mm_key)[:LIMIT]

          def rewrite_from_lines(dockerfile: Path, new_tag: str) -> None:
            txt = dockerfile.read_text(encoding="utf-8")
            txt2 = re.sub(
              r'(^\s*FROM\s+php:)\S+(\s+AS\s+)',
              rf'\g<1>{new_tag}\2',
              txt,
              flags=re.M,
            )
            dockerfile.write_text(txt2, encoding="utf-8")

          created: list[str] = []

          for mm in chosen_mms:
            target_mm_dir = VERSIONS_DIR / mm
            if target_mm_dir.exists():
              print(f"versions/{mm} already exists -> skipping")
              continue

            print(f"Creating versions/{mm} from versions/{base_mm}")
            target_mm_dir.mkdir(parents=True, exist_ok=True)

            for variant in REQUIRED_VARIANTS:
              src_variant_dir = base_dir / variant
              dst_variant_dir = target_mm_dir / variant
              dst_variant_dir.mkdir(parents=True, exist_ok=True)

              shutil.copy2(src_variant_dir / "Dockerfile", dst_variant_dir / "Dockerfile")
              if (src_variant_dir / "pecl.txt").exists():
                shutil.copy2(src_variant_dir / "pecl.txt", dst_variant_dir / "pecl.txt")

              full_tag = best_full_tag(mm, variant)
              if not full_tag:
                raise RuntimeError(f"Missing upstream tag for {mm} {variant} (unexpected)")
              rewrite_from_lines(dst_variant_dir / "Dockerfile", full_tag)

            created.append(mm)

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
            fh.write(f"new_php={','.join(created)}\n")
            fh.write(f"base_php={base_mm}\n")

          print(f"Done. Created: {created}, base: {base_mm}")
          PY

      - name: Create Pull Request
        if: steps.discover.outputs.new_php != ''
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(versions): add PHP ${{ steps.discover.outputs.new_php }}"
          title: "chore: add PHP ${{ steps.discover.outputs.new_php }}"
          body: |
            This PR was generated automatically.

            - Detected new upstream stable PHP minor version(s): `${{ steps.discover.outputs.new_php }}`
            - Scaffolded from existing version: `${{ steps.discover.outputs.base_php }}`

            Dockerfiles were updated to use full upstream tags for all variants present in the base PHP branch.
          branch: "bot/add-php-${{ steps.discover.outputs.new_php }}"
          delete-branch: true
          labels: |
            automation
            php
            versions
