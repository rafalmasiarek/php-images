name: build-and-test-new-php-versions

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "versions/**"
      - "build-php-images-sanity.yaml"
      - ".github/workflows/build-and-test-new-php-versions-sanity.yml"
  push:
    branches:
      - "bot/add-php-*"
    paths:
      - "versions/**"
      - "build-php-images-sanity.yaml"
      - ".github/workflows/build-and-test-new-php-versions-sanity.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-php-versions-sanity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: discover changed versions
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build matrix from changed Dockerfiles
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          changed="$(git diff --name-only "$base" "$head" | grep -E '^versions/[0-9]+\.[0-9]+/[^/]+/Dockerfile$' || true)"

          if [ -z "${changed//[[:space:]]/}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json="$(
            printf '%s\n' "$changed" | jq -c -R -s '
              split("\n")
              | map(select(length > 0))
              | map(capture("^versions/(?<mm>[0-9]+\\.[0-9]+)/(?<variant>[^/]+)/Dockerfile$"))
              | {include: map({
                  mm: .mm,
                  variant: .variant,
                  context: ("versions/" + .mm + "/" + .variant),
                  dockerfile: ("versions/" + .mm + "/" + .variant + "/Dockerfile"),
                  tag: ("local/php-" + .mm + "-" + .variant + ":report")
                })}
            '
          )"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"

  build:
    name: build and check
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare lifecycle metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > .lifecycle.env <<EOF
          PHP_BRANCH=${{ matrix.mm }}
          PHP_VERSION=${{ matrix.mm }}
          PHP_EOL=
          IMAGE_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Prepare selected hotfix directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (linux/amd64, linux/arm64) - validation only
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt

      - name: Build local candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}

      - name: Install sanityctl
        shell: bash
        env:
          SANITYCTL_VERSION: 1.2.0
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) asset="sanityctl-linux-amd64" ;;
            aarch64|arm64) asset="sanityctl-linux-arm64" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac
          base="https://github.com/rafalmasiarek/py-sanityctl/releases/download/v${SANITYCTL_VERSION}"
          curl -fsSL -o /tmp/"$asset" "$base/$asset"
          curl -fsSL -o /tmp/SHA256SUMS.txt "$base/SHA256SUMS.txt"
          ( cd /tmp && grep " $asset\$" SHA256SUMS.txt | sha256sum -c - )
          sudo install -m 0755 /tmp/"$asset" /usr/local/bin/sanityctl
          sanityctl --help

      - name: Run sanityctl checks
        id: sanity
        shell: bash
        env:
          IMAGE_TAG: ${{ matrix.tag }}
          PHP_MM: ${{ matrix.mm }}
          PECL_FILE: versions/${{ matrix.mm }}/${{ matrix.variant }}/pecl.txt
        run: |
          set -euo pipefail

          report="/tmp/php-report-${{ matrix.mm }}-${{ matrix.variant }}.md"

          {
            echo "<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->"
            echo "## PHP PR check: \`${{ matrix.mm }}\` / \`${{ matrix.variant }}\`"
            echo
            echo "**Image (local):** \`${{ matrix.tag }}\`"
            echo
            sanityctl run -f build-php-images-sanity.yaml --output text --summary
          } | tee "$report"

          echo "path=$report" >> "$GITHUB_OUTPUT"

      - name: Trivy scan candidate (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.tag }}
          format: json
          output: trivy-results-pre.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Detect Alpine versions
        id: alpine
        shell: bash
        run: |
          set -euo pipefail

          DOCKERFILE_ALPINE_FULL="$(
            awk '
              BEGIN { IGNORECASE=1 }
              /^FROM[[:space:]]+/ {
                if (match($0, /alpine:([0-9]+\.[0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine:([0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine([0-9]+\.[0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine([0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
              }
            ' "${{ matrix.dockerfile }}" || true
          )"
          DOCKERFILE_ALPINE_FULL="$(printf '%s' "$DOCKERFILE_ALPINE_FULL" | tr -d '\r\n')"

          DOCKERFILE_ALPINE_MINOR=""
          if [ -n "$DOCKERFILE_ALPINE_FULL" ]; then
            DOCKERFILE_ALPINE_MINOR="$(printf '%s' "$DOCKERFILE_ALPINE_FULL" | cut -d. -f1,2)"
          fi

          IMAGE_ALPINE_FULL="$(
            docker run --rm --entrypoint /bin/sh "${{ matrix.tag }}" -lc 'cat /etc/alpine-release' || true
          )"
          IMAGE_ALPINE_FULL="$(printf '%s' "$IMAGE_ALPINE_FULL" | tr -d '\r\n')"

          IMAGE_ALPINE_MINOR=""
          if [ -n "$IMAGE_ALPINE_FULL" ]; then
            IMAGE_ALPINE_MINOR="$(printf '%s' "$IMAGE_ALPINE_FULL" | cut -d. -f1,2)"
          fi

          {
            printf 'dockerfile_full=%s\n' "$DOCKERFILE_ALPINE_FULL"
            printf 'dockerfile_minor=%s\n' "$DOCKERFILE_ALPINE_MINOR"
            printf 'image_full=%s\n' "$IMAGE_ALPINE_FULL"
            printf 'image_minor=%s\n' "$IMAGE_ALPINE_MINOR"
          } >> "$GITHUB_OUTPUT"

      - name: Select matching hotfixes
        id: hotfixes
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

          mapfile -t CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          declare -a SEARCH_DIRS=()
          add_dir() {
            local dir="$1"
            [ -z "$dir" ] && return 0
            for existing in "${SEARCH_DIRS[@]:-}"; do
              [ "$existing" = "$dir" ] && return 0
            done
            SEARCH_DIRS+=("$dir")
          }

          add_dir "hotfixes/all"
          add_dir "hotfixes/alpine/all"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_full }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_full }}"
          add_dir "hotfixes/php/${{ matrix.mm }}/all"
          add_dir "hotfixes/php/${{ matrix.mm }}/${{ matrix.variant }}"

          declare -a MATCHED_CVES=()
          declare -a UNMATCHED_CVES=()
          declare -a SELECTED_FILES=()

          found=0
          idx=0

          for cve in "${CVES[@]}"; do
            matched_this_cve=0

            for dir in "${SEARCH_DIRS[@]}"; do
              [ -d "$dir" ] || continue
              shopt -s nullglob
              for f in "$dir/${cve}"-*.sh; do
                idx=$((idx + 1))
                dest=".hotfixes-selected/$(printf '%03d' "$idx")-$(basename "$f")"
                cp "$f" "$dest"
                SELECTED_FILES+=("$f")
                matched_this_cve=1
                found=1
              done
              shopt -u nullglob
            done

            if [ "$matched_this_cve" -eq 1 ]; then
              MATCHED_CVES+=("$cve")
            else
              UNMATCHED_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          if [ "$found" -eq 1 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matched_cves=$(joined "${MATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "unmatched_cves=$(joined "${UNMATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "selected_count=${#SELECTED_FILES[@]}" >> "$GITHUB_OUTPUT"

      - name: Rebuild local image with selected hotfixes
        if: steps.hotfixes.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}

      - name: Trivy scan final image (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.tag }}
          format: json
          output: trivy-results-post.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Analyze remediation result
        id: remediation
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t PRE_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          mapfile -t POST_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-post.json | sort -u
          )

          declare -A PRE_SET=()
          declare -A POST_SET=()

          for cve in "${PRE_CVES[@]}"; do
            PRE_SET["$cve"]=1
          done
          for cve in "${POST_CVES[@]}"; do
            POST_SET["$cve"]=1
          done

          declare -a FIXED_CVES=()
          declare -a REMAINING_CVES=()
          declare -a NEW_CVES=()

          for cve in "${PRE_CVES[@]}"; do
            if [ -n "${POST_SET[$cve]:-}" ]; then
              REMAINING_CVES+=("$cve")
            else
              FIXED_CVES+=("$cve")
            fi
          done

          for cve in "${POST_CVES[@]}"; do
            if [ -z "${PRE_SET[$cve]:-}" ]; then
              NEW_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          echo "fixed_cves=$(joined "${FIXED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "remaining_cves=$(joined "${REMAINING_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "new_cves=$(joined "${NEW_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "fixed_count=${#FIXED_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "remaining_count=${#REMAINING_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "new_count=${#NEW_CVES[@]}" >> "$GITHUB_OUTPUT"

      - name: Append security summary to PR report
        shell: bash
        env:
          REPORT_PATH: ${{ steps.sanity.outputs.path }}
        run: |
          set -euo pipefail

          pre_critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-pre.json)"
          pre_high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-pre.json)"
          pre_medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results-pre.json)"

          post_critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-post.json)"
          post_high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-post.json)"
          post_medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results-post.json)"

          {
            echo
            echo "### Security summary"
            echo
            echo "| Stage | Critical | High | Medium |"
            echo "|---|---:|---:|---:|"
            echo "| Before hotfixes | ${pre_critical} | ${pre_high} | ${pre_medium} |"
            echo "| After hotfixes | ${post_critical} | ${post_high} | ${post_medium} |"
            echo
            echo "### Hotfix matching"
            echo
            echo "- Hotfix scripts selected: \`${{ steps.hotfixes.outputs.selected_count }}\`"
            echo "- Matching hotfix CVEs found: \`${{ steps.hotfixes.outputs.matched_cves || 'none' }}\`"
            echo "- Unmatched CVEs: \`${{ steps.hotfixes.outputs.unmatched_cves || 'none' }}\`"
            echo "- Hotfix rebuild performed: \`${{ steps.hotfixes.outputs.enabled }}\`"
            echo "- Fixed CVEs after rebuild: \`${{ steps.remediation.outputs.fixed_count }}\`"
            echo "- Remaining CVEs after rebuild: \`${{ steps.remediation.outputs.remaining_count }}\`"
            echo "- New CVEs after rebuild: \`${{ steps.remediation.outputs.new_count }}\`"
          } >> "$REPORT_PATH"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-report-${{ matrix.mm }}-${{ matrix.variant }}
          path: ${{ steps.sanity.outputs.path }}

      - name: Upload Trivy pre-scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-pre-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-pre.json

      - name: Upload Trivy post-scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-post-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-post.json

      - name: Comment report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('${{ steps.sanity.outputs.path }}', 'utf8');
            const marker = `<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment => (comment.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  skip:
    name: build and check (no changes)
    needs: discover
    if: needs.discover.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No version Dockerfiles changed
        shell: bash
        run: |
          echo "No changes detected in versions/*/*/Dockerfile. Skipping build."

  ci:
    name: build-php-versions-sanity (required)
    needs: [discover, build, skip]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide final status
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "cancelled" ]; then
            echo "Build job failed or was cancelled."
            exit 1
          fi

          echo "CI succeeded."
