name: build-and-test-new-php-versions

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened, ready_for_review ]
    paths:
      - "versions/**"
      - "rootfs/**"
      - "hotfixes/**"
      - "build-php-images-sanity.yaml"
      - ".github/workflows/build-and-test-new-php-versions.yml"
  push:
    branches:
      - "bot/add-php-*"
    paths:
      - "versions/**"
      - "rootfs/**"
      - "hotfixes/**"
      - "build-php-images-sanity.yaml"
      - ".github/workflows/build-and-test-new-php-versions.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-php-versions-sanity-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: php

jobs:
  discover:
    name: discover changed versions
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build matrix from changed files
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            export BASE_REF="${{ github.event.pull_request.base.ref }}"

            git fetch origin "$BASE_REF"
            export BASE_SHA="$(git merge-base "origin/$BASE_REF" "$HEAD_SHA")"
          else
            export BASE_SHA="${{ github.event.before }}"
            export HEAD_SHA="${{ github.sha }}"
          fi

          echo "BASE_SHA=$BASE_SHA"
          echo "HEAD_SHA=$HEAD_SHA"

          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          root = Path("versions")

          def all_dockerfiles():
              return sorted(root.glob("*/*/Dockerfile"))

          def dockerfiles_for_php(php: str):
              php_dir = root / php
              if not php_dir.exists():
                  return []
              return sorted(php_dir.glob("*/Dockerfile"))

          def dockerfile_alpine_versions(dockerfile: Path):
              text = dockerfile.read_text(encoding="utf-8", errors="ignore")
              result = ("", "")

              patterns = [
                  r"alpine:([0-9]+\.[0-9]+\.[0-9]+)",
                  r"alpine:([0-9]+\.[0-9]+)",
                  r"alpine([0-9]+\.[0-9]+\.[0-9]+)",
                  r"alpine([0-9]+\.[0-9]+)",
              ]

              for line in text.splitlines():
                  line = line.strip()
                  if not line.upper().startswith("FROM "):
                      continue

                  for pattern in patterns:
                      m = re.search(pattern, line, re.IGNORECASE)
                      if not m:
                          continue

                      version = m.group(1)
                      parts = version.split(".")
                      minor = ".".join(parts[:2]) if len(parts) >= 2 else version
                      result = (version, minor)
                      break

              return result

          def dockerfiles_matching_alpine(version: str):
              matched = []
              for dockerfile in all_dockerfiles():
                  full, minor = dockerfile_alpine_versions(dockerfile)
                  if version and version in {full, minor}:
                      matched.append(dockerfile)
              return sorted(matched)

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]

          out = subprocess.check_output(
              ["git", "diff", "--name-only", base, head],
              text=True,
          )
          changed = [line.strip() for line in out.splitlines() if line.strip()]

          print("Changed files:")
          for path in changed:
              print(f" - {path}")

          selected = set()
          full_build = False

          for path in changed:
              parts = path.split("/")

              if path.startswith("versions/"):
                  if len(parts) >= 3:
                      php = parts[1]
                      variant = parts[2]
                      dockerfile = root / php / variant / "Dockerfile"
                      if dockerfile.exists():
                          selected.add(str(dockerfile))
                  continue

              if path.startswith("hotfixes/all/") or path.startswith("hotfixes/alpine/all/"):
                  full_build = True
                  continue

              if path.startswith("hotfixes/php/"):
                  if len(parts) >= 4:
                      php = parts[2]
                      scope = parts[3]

                      if scope == "all":
                          for dockerfile in dockerfiles_for_php(php):
                              selected.add(str(dockerfile))
                      else:
                          dockerfile = root / php / scope / "Dockerfile"
                          if dockerfile.exists():
                              selected.add(str(dockerfile))
                  continue

              if path.startswith("hotfixes/alpine/"):
                  if len(parts) >= 3:
                      alpine_ver = parts[2]
                      if alpine_ver == "all":
                          full_build = True
                      else:
                          candidates = {alpine_ver}

                          ver_parts = alpine_ver.split(".")
                          if len(ver_parts) >= 3:
                              candidates.add(".".join(ver_parts[:2]))

                          for candidate in sorted(candidates):
                              for dockerfile in dockerfiles_matching_alpine(candidate):
                                  selected.add(str(dockerfile))
                  continue

              if path.startswith("rootfs/"):
                  full_build = True
                  continue

              if path in {
                  "build-php-images-sanity.yaml",
                  ".github/workflows/build-and-test-new-php-versions.yml",
              }:
                  full_build = True
                  continue

          dockerfiles = all_dockerfiles() if full_build else sorted(Path(p) for p in selected)

          print("Selected Dockerfiles:")
          for dockerfile in dockerfiles:
              print(f" - {dockerfile}")

          include = []
          for dockerfile in dockerfiles:
              php = dockerfile.parts[1]
              variant = dockerfile.parts[2]
              include.append({
                  "mm": php,
                  "variant": variant,
                  "context": f"versions/{php}/{variant}",
                  "dockerfile": f"versions/{php}/{variant}/Dockerfile",
                  "tag": f"local/php-{php}-{variant}:precheck",
              })

          matrix = {"include": include}

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"has_changes={'true' if include else 'false'}\n")
              fh.write("matrix=" + json.dumps(matrix, separators=(",", ":")) + "\n")
          PY

  build:
    name: build and check
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare lifecycle metadata and hotfix workspace
        shell: bash
        run: |
          set -euo pipefail

          cat > .lifecycle.env <<EOF
          PHP_BRANCH=${{ matrix.mm }}
          PHP_VERSION=${{ matrix.mm }}
          PHP_EOL=
          EOF

          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected
          : > .hotfixes-selected-files.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Trivy data
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ runner.arch }}-latest

      - name: Install Trivy CLI
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Build local candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          pull: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ matrix.mm }}-${{ matrix.variant }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.mm }}-${{ matrix.variant }}

      - name: Cache sanityctl
        uses: actions/cache@v5
        with:
          path: ~/.cache/sanityctl
          key: sanityctl-${{ runner.os }}-${{ runner.arch }}-latest

      - name: Install sanityctl
        shell: bash
        run: |
          set -euo pipefail

          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) asset="sanityctl-linux-amd64" ;;
            aarch64|arm64) asset="sanityctl-linux-arm64" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac

          cache_dir="${HOME}/.cache/sanityctl"
          mkdir -p "$cache_dir"
          base="https://github.com/rafalmasiarek/py-sanityctl/releases/download/latest"

          if [ ! -f "${cache_dir}/${asset}" ]; then
            curl -fsSL -o "${cache_dir}/${asset}" "$base/$asset"
          fi

          if [ ! -f "${cache_dir}/SHA256SUMS.txt" ]; then
            curl -fsSL -o "${cache_dir}/SHA256SUMS.txt" "$base/SHA256SUMS.txt"
          fi

          grep " $asset\$" "${cache_dir}/SHA256SUMS.txt" | sed "s#  $asset#  ${cache_dir}/${asset}#" | sha256sum -c -
          sudo install -m 0755 "${cache_dir}/${asset}" /usr/local/bin/sanityctl
          sanityctl --help &> /dev/null

      - name: Collect data for sanity checks
        shell: bash
        env:
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail

          rm -rf .sanity-cache
          mkdir -p .sanity-cache

          docker run --rm \
            -v "$PWD/.sanity-cache:/out" \
            "$IMAGE_TAG" \
            sh -lc '
              set -euo pipefail

              phpctl version > /out/phpctl-version.txt
              phpctl --output json info > /out/phpctl-info.json
              phpctl --output json ext versions > /out/phpctl-ext-versions.json
              phpctl --output json ext list > /out/phpctl-ext-list.json
              php -v > /out/php-v.txt
              php -m > /out/php-m.txt
              cat /etc/alpine-release > /out/alpine-release.txt
            '

      - name: Run sanityctl checks
        id: sanity
        shell: bash
        env:
          IMAGE_TAG: ${{ matrix.tag }}
          PHP_MM: ${{ matrix.mm }}
          PECL_FILE: versions/${{ matrix.mm }}/${{ matrix.variant }}/pecl.txt
        run: |
          set -euo pipefail

          report="/tmp/php-report-${{ matrix.mm }}-${{ matrix.variant }}.md"

          {
            echo "<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->"
            echo "## PHP PR check: \`${{ matrix.mm }}\` / \`${{ matrix.variant }}\`"
            echo
            echo "**Image (local):** \`${{ matrix.tag }}\`"
            echo
            sanityctl run -f build-php-images-sanity.yaml --output text --summary markdown
          } | tee "$report"

          echo "path=$report" >> "$GITHUB_OUTPUT"

      - name: Trivy scan candidate (JSON)
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --cache-dir ~/.cache/trivy \
            --format json \
            --output trivy-results-pre.json \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            "${{ matrix.tag }}"

      - name: Detect Alpine versions
        id: alpine
        shell: bash
        run: |
          set -euo pipefail

          DOCKERFILE_ALPINE_FULL="$(
            awk '
              BEGIN { IGNORECASE=1 }
              /^FROM[[:space:]]+/ {
                if (match($0, /alpine:([0-9]+\.[0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine:([0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine([0-9]+\.[0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine([0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
              }
            ' "${{ matrix.dockerfile }}" || true
          )"
          DOCKERFILE_ALPINE_FULL="$(printf '%s' "$DOCKERFILE_ALPINE_FULL" | tr -d '\r\n')"

          DOCKERFILE_ALPINE_MINOR=""
          if [ -n "$DOCKERFILE_ALPINE_FULL" ]; then
            DOCKERFILE_ALPINE_MINOR="$(printf '%s' "$DOCKERFILE_ALPINE_FULL" | cut -d. -f1,2)"
          fi

          IMAGE_ALPINE_FULL="$(
            docker run --rm --entrypoint /bin/sh "${{ matrix.tag }}" -lc 'cat /etc/alpine-release' || true
          )"
          IMAGE_ALPINE_FULL="$(printf '%s' "$IMAGE_ALPINE_FULL" | tr -d '\r\n')"

          IMAGE_ALPINE_MINOR=""
          if [ -n "$IMAGE_ALPINE_FULL" ]; then
            IMAGE_ALPINE_MINOR="$(printf '%s' "$IMAGE_ALPINE_FULL" | cut -d. -f1,2)"
          fi

          {
            printf 'dockerfile_full=%s\n' "$DOCKERFILE_ALPINE_FULL"
            printf 'dockerfile_minor=%s\n' "$DOCKERFILE_ALPINE_MINOR"
            printf 'image_full=%s\n' "$IMAGE_ALPINE_FULL"
            printf 'image_minor=%s\n' "$IMAGE_ALPINE_MINOR"
          } >> "$GITHUB_OUTPUT"

      - name: Select matching hotfixes
        id: hotfixes
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

          declare -a SEARCH_DIR_ARGS=()

          add_dir() {
            local dir="$1"
            [ -z "$dir" ] && return 0
            SEARCH_DIR_ARGS+=(--search-dir "$dir")
          }

          add_dir "hotfixes/all"
          add_dir "hotfixes/alpine/all"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_full }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_full }}"
          add_dir "hotfixes/php/${{ matrix.mm }}/all"
          add_dir "hotfixes/php/${{ matrix.mm }}/${{ matrix.variant }}"

          python3 scripts/resolve-hotfixes.py \
            --trivy trivy-results-pre.json \
            "${SEARCH_DIR_ARGS[@]}" \
            --copy-to .hotfixes-selected \
            --selection-manifest-name selection.json \
            --output .hotfixes-selected-report.json

          selected_count="$(
            jq -r '.stats.selected_hotfixes // 0' .hotfixes-selected-report.json
          )"

          matched_cves="$(
            jq -r '
              [
                .matched_by
                | to_entries[]
                | .value[]
                | select(startswith("cve:"))
                | sub("^cve:"; "")
              ]
              | unique
              | join(",")
            ' .hotfixes-selected-report.json
          )"

          unmatched_cves="$(
            jq -r '
              (.unmatched_cves // [])
              | join(",")
            ' .hotfixes-selected-report.json
          )"

          selected_files="$(
            jq -r '
              (.selected_files // [])
              | .[]
            ' .hotfixes-selected-report.json
          )"

          if [ "${selected_count}" -gt 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matched_cves=${matched_cves}" >> "$GITHUB_OUTPUT"
          echo "unmatched_cves=${unmatched_cves}" >> "$GITHUB_OUTPUT"
          echo "selected_count=${selected_count}" >> "$GITHUB_OUTPUT"

          : > .hotfixes-selected-files.txt
          if [ -n "${selected_files}" ]; then
            printf '%s\n' "${selected_files}" > .hotfixes-selected-files.txt
          fi

      - name: Rebuild local image with selected hotfixes
        if: steps.hotfixes.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          pull: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ matrix.mm }}-${{ matrix.variant }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.mm }}-${{ matrix.variant }}

      - name: Trivy scan final image (JSON)
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --cache-dir ~/.cache/trivy \
            --format json \
            --output trivy-results-post.json \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            "${{ matrix.tag }}"

      - name: Analyze remediation result
        id: remediation
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t PRE_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          mapfile -t POST_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-post.json | sort -u
          )

          declare -A PRE_SET=()
          declare -A POST_SET=()

          for cve in "${PRE_CVES[@]}"; do
            PRE_SET["$cve"]=1
          done
          for cve in "${POST_CVES[@]}"; do
            POST_SET["$cve"]=1
          done

          declare -a FIXED_CVES=()
          declare -a REMAINING_CVES=()
          declare -a NEW_CVES=()

          for cve in "${PRE_CVES[@]}"; do
            if [ -n "${POST_SET[$cve]:-}" ]; then
              REMAINING_CVES+=("$cve")
            else
              FIXED_CVES+=("$cve")
            fi
          done

          for cve in "${POST_CVES[@]}"; do
            if [ -z "${PRE_SET[$cve]:-}" ]; then
              NEW_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          echo "fixed_cves=$(joined "${FIXED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "remaining_cves=$(joined "${REMAINING_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "new_cves=$(joined "${NEW_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "fixed_count=${#FIXED_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "remaining_count=${#REMAINING_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "new_count=${#NEW_CVES[@]}" >> "$GITHUB_OUTPUT"

      - name: Append security summary to PR report
        shell: bash
        env:
          REPORT_PATH: ${{ steps.sanity.outputs.path }}
        run: |
          set -euo pipefail

          pre_critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-pre.json)"
          pre_high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-pre.json)"
          pre_medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results-pre.json)"

          post_critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-post.json)"
          post_high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-post.json)"
          post_medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results-post.json)"

          {
            echo
            echo "### Security summary"
            echo
            echo "| Stage | Critical | High | Medium |"
            echo "|---|---:|---:|---:|"
            echo "| Before hotfixes | ${pre_critical} | ${pre_high} | ${pre_medium} |"
            echo "| After hotfixes | ${post_critical} | ${post_high} | ${post_medium} |"
            echo
            echo "### Hotfix matching"
            echo
            echo "- Hotfix scripts selected: \`${{ steps.hotfixes.outputs.selected_count }}\`"
            echo "- Matching hotfix CVEs found: \`${{ steps.hotfixes.outputs.matched_cves || 'none' }}\`"
            echo "- Unmatched CVEs: \`${{ steps.hotfixes.outputs.unmatched_cves || 'none' }}\`"
            echo "- Hotfix rebuild performed: \`${{ steps.hotfixes.outputs.enabled }}\`"
            echo "- Fixed CVEs after rebuild: \`${{ steps.remediation.outputs.fixed_count }}\`"
            echo "- Remaining CVEs after rebuild: \`${{ steps.remediation.outputs.remaining_count }}\`"
            echo "- New CVEs after rebuild: \`${{ steps.remediation.outputs.new_count }}\`"
          } >> "$REPORT_PATH"

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-report-${{ matrix.mm }}-${{ matrix.variant }}
          path: ${{ steps.sanity.outputs.path }}

      - name: Upload Trivy pre-scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-pre-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-pre.json

      - name: Upload Trivy post-scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-post-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-post.json

      - name: Comment report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('${{ steps.sanity.outputs.path }}', 'utf8');
            const marker = `<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment => (comment.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  skip:
    name: build and check (no changes)
    needs: discover
    if: needs.discover.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No affected variants changed
        shell: bash
        run: |
          echo "No affected PHP image variants detected. Skipping build."

  ci:
    name: build-php-versions-sanity (required)
    needs: [ discover, build, skip ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide final status
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "cancelled" ]; then
            echo "Build job failed or was cancelled."
            exit 1
          fi

          echo "CI succeeded."
