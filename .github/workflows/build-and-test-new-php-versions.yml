name: build-and-test-new-php-versions

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "versions/**"
      - ".github/workflows/build-and-test-new-php-versions.yml"
  push:
    branches:
      - "bot/add-php-*"
    paths:
      - "versions/**"
      - ".github/workflows/build-and-test-new-php-versions.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-php-versions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: discover changed versions
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build matrix from changed Dockerfiles
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          changed="$(git diff --name-only "$base" "$head" | grep -E '^versions/[0-9]+\.[0-9]+/[^/]+/Dockerfile$' || true)"

          if [ -z "${changed//[[:space:]]/}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export CHANGED="$changed"

          MATRIX_JSON="$(python3 - <<'PY'
          import json
          import os
          import re

          changed = os.environ["CHANGED"].splitlines()

          include = []
          for path in changed:
            m = re.match(r"^versions/(\d+\.\d+)/([^/]+)/Dockerfile$", path)
            if not m:
              continue

            mm = m.group(1)
            variant = m.group(2)
            include.append({
              "mm": mm,
              "variant": variant,
              "context": f"versions/{mm}/{variant}",
              "dockerfile": f"versions/{mm}/{variant}/Dockerfile",
              "pecl_file": f"versions/{mm}/{variant}/pecl.txt",
              "tag": f"local/php-{mm}-{variant}:report"
            })

          print(json.dumps({"include": include}, separators=(",", ":")))
          PY
          )"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build:
    name: build and report
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare lifecycle metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > .lifecycle.env <<EOF
          PHP_BRANCH=${{ matrix.mm }}
          PHP_VERSION=${{ matrix.mm }}
          PHP_EOL=
          IMAGE_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Prepare selected hotfix directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (linux/amd64, linux/arm64) - validation only
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt

      - name: Build local candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}

      - name: Trivy scan candidate (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.tag }}
          format: json
          output: trivy-results-pre.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Detect Alpine versions
        id: alpine
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' > /tmp/alpine_versions.env
          import re
          import subprocess
          from pathlib import Path

          dockerfile_path = Path("${{ matrix.dockerfile }}")
          content = dockerfile_path.read_text(encoding="utf-8", errors="replace")

          dockerfile_full = ""
          for line in content.splitlines():
              if not re.match(r"^\s*FROM\s+", line, flags=re.IGNORECASE):
                  continue
              m = re.search(r"alpine:([0-9]+\.[0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
              m = re.search(r"alpine:([0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
              m = re.search(r"alpine([0-9]+\.[0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
              m = re.search(r"alpine([0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break

          dockerfile_minor = ".".join(dockerfile_full.split(".")[:2]) if dockerfile_full else ""

          try:
              image_full = subprocess.check_output(
                  ["docker", "run", "--rm", "--entrypoint", "/bin/sh", "${{ matrix.tag }}", "-lc", "cat /etc/alpine-release"],
                  text=True,
                  stderr=subprocess.DEVNULL,
              ).strip()
          except Exception:
              image_full = ""

          image_minor = ".".join(image_full.split(".")[:2]) if image_full else ""

          print(f"dockerfile_full={dockerfile_full}")
          print(f"dockerfile_minor={dockerfile_minor}")
          print(f"image_full={image_full}")
          print(f"image_minor={image_minor}")
          PY

          cat /tmp/alpine_versions.env >> "$GITHUB_OUTPUT"

      - name: Select matching hotfixes
        id: hotfixes
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

          mapfile -t CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          declare -a SEARCH_DIRS=()
          add_dir() {
            local dir="$1"
            [ -z "$dir" ] && return 0
            for existing in "${SEARCH_DIRS[@]:-}"; do
              [ "$existing" = "$dir" ] && return 0
            done
            SEARCH_DIRS+=("$dir")
          }

          add_dir "hotfixes/all"
          add_dir "hotfixes/alpine/all"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_full }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_full }}"
          add_dir "hotfixes/php/${{ matrix.mm }}/all"
          add_dir "hotfixes/php/${{ matrix.mm }}/${{ matrix.variant }}"

          declare -a MATCHED_CVES=()
          declare -a UNMATCHED_CVES=()
          declare -a SELECTED_FILES=()

          found=0
          idx=0

          for cve in "${CVES[@]}"; do
            matched_this_cve=0

            for dir in "${SEARCH_DIRS[@]}"; do
              [ -d "$dir" ] || continue
              shopt -s nullglob
              for f in "$dir/${cve}"-*.sh; do
                idx=$((idx + 1))
                dest=".hotfixes-selected/$(printf '%03d' "$idx")-$(basename "$f")"
                cp "$f" "$dest"
                SELECTED_FILES+=("$f")
                matched_this_cve=1
                found=1
              done
              shopt -u nullglob
            done

            if [ "$matched_this_cve" -eq 1 ]; then
              MATCHED_CVES+=("$cve")
            else
              UNMATCHED_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          if [ "$found" -eq 1 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matched_cves=$(joined "${MATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "unmatched_cves=$(joined "${UNMATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "selected_count=${#SELECTED_FILES[@]}" >> "$GITHUB_OUTPUT"

      - name: Rebuild local image with selected hotfixes
        if: steps.hotfixes.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}

      - name: Trivy scan final image (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.tag }}
          format: json
          output: trivy-results-post.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Analyze remediation result
        id: remediation
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t PRE_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          mapfile -t POST_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-post.json | sort -u
          )

          declare -A PRE_SET=()
          declare -A POST_SET=()

          for cve in "${PRE_CVES[@]}"; do
            PRE_SET["$cve"]=1
          done
          for cve in "${POST_CVES[@]}"; do
            POST_SET["$cve"]=1
          done

          declare -a FIXED_CVES=()
          declare -a REMAINING_CVES=()
          declare -a NEW_CVES=()

          for cve in "${PRE_CVES[@]}"; do
            if [ -n "${POST_SET[$cve]:-}" ]; then
              REMAINING_CVES+=("$cve")
            else
              FIXED_CVES+=("$cve")
            fi
          done

          for cve in "${POST_CVES[@]}"; do
            if [ -z "${PRE_SET[$cve]:-}" ]; then
              NEW_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          echo "fixed_cves=$(joined "${FIXED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "remaining_cves=$(joined "${REMAINING_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "new_cves=$(joined "${NEW_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "fixed_count=${#FIXED_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "remaining_count=${#REMAINING_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "new_count=${#NEW_CVES[@]}" >> "$GITHUB_OUTPUT"

      - name: Run phpctl smoke tests
        id: phpctl_smoke
        shell: bash
        run: |
          set -euo pipefail

          img="${{ matrix.tag }}"
          log="/tmp/phpctl-smoke-${{ matrix.mm }}-${{ matrix.variant }}.txt"

          {
            echo "### phpctl smoke tests for $img"
            echo

            echo "== phpctl version =="
            docker run --rm "$img" sh -lc 'phpctl version'

            echo
            echo "== phpctl help =="
            docker run --rm "$img" sh -lc 'phpctl help | sed -n "1,25p"'

            echo
            echo "== phpctl json version =="
            docker run --rm "$img" sh -lc 'phpctl --output json version'

            echo
            echo "== phpctl json info =="
            docker run --rm "$img" sh -lc 'phpctl --output json info'

            echo
            echo "== phpctl json paths =="
            docker run --rm "$img" sh -lc 'phpctl --output json paths'

            echo
            echo "== phpctl json doctor =="
            docker run --rm "$img" sh -lc 'phpctl --output json doctor'

            echo
            echo "== phpctl json self-test =="
            docker run --rm "$img" sh -lc 'phpctl --output json self-test'

            echo
            echo "== phpctl json ext list =="
            docker run --rm "$img" sh -lc 'phpctl --output json ext list'

            echo
            echo "== phpctl json ext versions =="
            docker run --rm "$img" sh -lc 'phpctl --output json ext versions'

            echo
            echo "== phpctl ext detect gd =="
            docker run --rm "$img" sh -lc 'phpctl ext detect gd'

            echo
            echo "== phpctl ext detect redis =="
            docker run --rm "$img" sh -lc 'phpctl ext detect redis || true'

            echo
            echo "== phpctl ini show =="
            docker run --rm "$img" sh -lc 'phpctl --output json ini show'

            echo
            echo "== phpctl ini get memory_limit =="
            docker run --rm "$img" sh -lc 'phpctl --output json ini get memory_limit'

            if [ "${{ matrix.variant }}" = "fpm" ]; then
              echo
              echo "== phpctl fpm status =="
              docker run --rm "$img" sh -lc 'phpctl --output json fpm status'

              echo
              echo "== phpctl fpm test =="
              docker run --rm "$img" sh -lc 'phpctl --output json fpm test || true'

              echo
              echo "== phpctl fpm pool render =="
              docker run --rm "$img" sh -lc 'phpctl fpm pool render smoke -p ENABLE_METRICS=true -p STATUS_PATH=/fpm-status-smoke'

              echo
              echo "== phpctl fpm pool create/show/enable/disable/delete =="
              docker run --rm "$img" sh -lc '
                set -eu
                phpctl fpm pool create smoke -p ENABLE_METRICS=true -p STATUS_PATH=/fpm-status-smoke
                phpctl --output json fpm pool show smoke
                phpctl --output json fpm pool enable smoke
                phpctl --output json fpm pool disable smoke
                phpctl --output json fpm pool delete smoke
              '
            else
              echo
              echo "== phpctl status =="
              docker run --rm "$img" sh -lc 'phpctl --output json status || true'

              echo
              echo "== phpctl health =="
              docker run --rm "$img" sh -lc 'phpctl --output json health || true'

              echo
              echo "== phpctl metrics =="
              docker run --rm "$img" sh -lc 'phpctl metrics | sed -n "1,30p" || true'
            fi
          } | tee "$log"

          echo "log=$log" >> "$GITHUB_OUTPUT"

      - name: Collect phpctl outputs
        shell: bash
        run: |
          set -euo pipefail

          img="${{ matrix.tag }}"

          docker run --rm "$img" sh -lc 'phpctl version' > /tmp/phpctl-version.txt
          docker run --rm "$img" sh -lc 'phpctl --output json info' > /tmp/phpctl-info.json
          docker run --rm "$img" sh -lc 'phpctl --output json paths' > /tmp/phpctl-paths.json
          docker run --rm "$img" sh -lc 'phpctl --output json doctor' > /tmp/phpctl-doctor.json
          docker run --rm "$img" sh -lc 'phpctl --output json self-test' > /tmp/phpctl-self-test.json
          docker run --rm "$img" sh -lc 'phpctl --output json ini show' > /tmp/phpctl-ini-show.json
          docker run --rm "$img" sh -lc 'phpctl --output json ext list' > /tmp/phpctl-ext-list.json
          docker run --rm "$img" sh -lc 'phpctl --output json ext so-list' > /tmp/phpctl-ext-so-list.json

          if [ "${{ matrix.variant }}" = "fpm" ]; then
            docker run --rm "$img" sh -lc 'phpctl --output json fpm status' > /tmp/phpctl-fpm-status.json || echo '{}' > /tmp/phpctl-fpm-status.json
          else
            echo '{}' > /tmp/phpctl-fpm-status.json
          fi

      - name: Generate PHP and security report
        id: report
        shell: bash
        env:
          HOTFIX_ENABLED: ${{ steps.hotfixes.outputs.enabled }}
          HOTFIX_MATCHED_CVES: ${{ steps.hotfixes.outputs.matched_cves }}
          HOTFIX_UNMATCHED_CVES: ${{ steps.hotfixes.outputs.unmatched_cves }}
          HOTFIX_SELECTED_COUNT: ${{ steps.hotfixes.outputs.selected_count }}
          REM_FIXED_COUNT: ${{ steps.remediation.outputs.fixed_count }}
          REM_REMAINING_COUNT: ${{ steps.remediation.outputs.remaining_count }}
          REM_NEW_COUNT: ${{ steps.remediation.outputs.new_count }}
          PHP_MM: ${{ matrix.mm }}
          PHP_VARIANT: ${{ matrix.variant }}
          IMAGE_TAG: ${{ matrix.tag }}
          PECL_FILE_PATH: ${{ matrix.pecl_file }}
          PHPCTL_SMOKE_LOG: ${{ steps.phpctl_smoke.outputs.log }}
        run: |
          set -euo pipefail
          out="/tmp/php-report-${{ matrix.mm }}-${{ matrix.variant }}.md"

          python3 - <<'PY' > "$out"
          import json
          import os
          from pathlib import Path

          def load_json(path):
              with open(path, "r", encoding="utf-8") as fh:
                  return json.load(fh)

          def counts(obj):
              result = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0}
              for res in obj.get("Results", []) or []:
                  for vuln in res.get("Vulnerabilities", []) or []:
                      sev = str(vuln.get("Severity") or "").upper()
                      if sev in result:
                          result[sev] += 1
              return result

          severity_rank = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "UNKNOWN": 4}

          def remaining_rows(obj):
              rows = []
              seen = set()
              for res in obj.get("Results", []) or []:
                  for vuln in res.get("Vulnerabilities", []) or []:
                      sev = str(vuln.get("Severity") or "UNKNOWN").upper()
                      if sev not in ("CRITICAL", "HIGH", "MEDIUM"):
                          continue
                      vid = str(vuln.get("VulnerabilityID") or "")
                      pkg = str(vuln.get("PkgName") or "")
                      installed = str(vuln.get("InstalledVersion") or "")
                      fixed = str(vuln.get("FixedVersion") or "")
                      key = (vid, pkg, installed, fixed, sev)
                      if key in seen:
                          continue
                      seen.add(key)
                      rows.append({
                          "id": vid,
                          "pkg": pkg,
                          "severity": sev,
                          "installed": installed,
                          "fixed": fixed,
                      })
              rows.sort(key=lambda r: (severity_rank.get(r["severity"], 9), r["pkg"], r["id"]))
              return rows

          def load_expected_pecl(path):
              items = []
              p = Path(path)
              if not p.exists():
                  return items
              for raw in p.read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  items.append(line)
              return items

          def yesno_to_emoji(value):
              return "✅" if value else "❌"

          def md_escape(text):
              return str(text).replace("|", "\\|")

          pre = load_json("trivy-results-pre.json")
          post = load_json("trivy-results-post.json")
          info = load_json("/tmp/phpctl-info.json")
          paths = load_json("/tmp/phpctl-paths.json")
          doctor = load_json("/tmp/phpctl-doctor.json")
          self_test = load_json("/tmp/phpctl-self-test.json")
          ini_show = load_json("/tmp/phpctl-ini-show.json")
          ext_list = load_json("/tmp/phpctl-ext-list.json")
          so_list = load_json("/tmp/phpctl-ext-so-list.json")
          fpm_status = load_json("/tmp/phpctl-fpm-status.json")

          phpctl_version = Path("/tmp/phpctl-version.txt").read_text(encoding="utf-8").strip()
          expected = load_expected_pecl(os.environ["PECL_FILE_PATH"])
          smoke_log = Path(os.environ["PHPCTL_SMOKE_LOG"]).read_text(encoding="utf-8") if os.environ.get("PHPCTL_SMOKE_LOG") else ""

          pre_counts = counts(pre)
          post_counts = counts(post)
          rows = remaining_rows(post)[:15]

          hotfix_enabled = os.environ.get("HOTFIX_ENABLED", "")
          matched = [x for x in os.environ.get("HOTFIX_MATCHED_CVES", "").split(",") if x]
          unmatched = [x for x in os.environ.get("HOTFIX_UNMATCHED_CVES", "").split(",") if x]
          selected_count = os.environ.get("HOTFIX_SELECTED_COUNT", "0")
          fixed_count = os.environ.get("REM_FIXED_COUNT", "0")
          remaining_count = os.environ.get("REM_REMAINING_COUNT", "0")
          new_count = os.environ.get("REM_NEW_COUNT", "0")

          actual_map = {}
          for row in ext_list:
              name = str(row.get("name") or "").strip()
              if not name:
                  continue
              actual_map[name] = {
                  "available": bool(row.get("available")),
                  "active": bool(row.get("active")),
                  "loaded": bool(row.get("loaded")),
                  "version": str(row.get("version") or "-"),
                  "available_ini": str(row.get("available_ini") or "-"),
                  "active_ini": str(row.get("active_ini") or "-"),
              }

          ext_names = sorted(set(expected) | set(actual_map.keys()), key=lambda s: s.lower())

          expected_missing = []
          unexpected_installed = []
          active_not_loaded = []

          for name in ext_names:
              expected_flag = name in expected
              actual = actual_map.get(name, {})
              available = bool(actual.get("available"))
              active = bool(actual.get("active"))
              loaded = bool(actual.get("loaded"))

              if expected_flag and not available:
                  expected_missing.append(name)
              if (not expected_flag) and available:
                  unexpected_installed.append(name)
              if active and not loaded:
                  active_not_loaded.append(name)

          print(f"<!-- php-report:{os.environ['PHP_MM']}:{os.environ['PHP_VARIANT']} -->")
          print(f"## PHP report: `{os.environ['PHP_MM']}` / `{os.environ['PHP_VARIANT']}`")
          print()
          print(f"**Image (local):** `{os.environ['IMAGE_TAG']}`")
          print()
          print(f"**phpctl:** `{phpctl_version}`")
          print()
          print("### phpctl smoke tests")
          print()
          print("- Overall result: `passed`")
          print()
          print("<details>")
          print("<summary>Show phpctl smoke test log</summary>")
          print()
          print("```text")
          print(smoke_log.rstrip())
          print("```")
          print()
          print("</details>")
          print()
          print("### Security summary")
          print()
          print("| Stage | Critical | High | Medium |")
          print("|---|---:|---:|---:|")
          print(f"| Before hotfixes | {pre_counts['CRITICAL']} | {pre_counts['HIGH']} | {pre_counts['MEDIUM']} |")
          print(f"| After hotfixes | {post_counts['CRITICAL']} | {post_counts['HIGH']} | {post_counts['MEDIUM']} |")
          print()
          print("### Hotfix matching")
          print()
          print(f"- Hotfix scripts selected: `{selected_count}`")
          print(f"- Matching hotfix CVEs found: `{'yes' if matched else 'no'}`")
          print(f"- Hotfix rebuild performed: `{'yes' if hotfix_enabled == 'true' else 'no'}`")
          print(f"- Fixed CVEs after rebuild: `{fixed_count}`")
          print(f"- Remaining CVEs after rebuild: `{remaining_count}`")
          print(f"- New CVEs after rebuild: `{new_count}`")
          print()

          if matched:
              shown = ", ".join(f"`{x}`" for x in matched[:20])
              print(f"- Matched CVEs: {shown}")
          else:
              print("- Matched CVEs: none")

          if unmatched:
              shown = ", ".join(f"`{x}`" for x in unmatched[:20])
              print(f"- Unmatched CVEs: {shown}")
          else:
              print("- Unmatched CVEs: none")

          print()
          print("### Top remaining CVEs")
          print()

          if rows:
              print("| CVE | Severity | Package | Installed | Fixed version |")
              print("|---|---|---|---|---|")
              for row in rows:
                  fixed = row["fixed"] if row["fixed"] else "-"
                  installed = row["installed"] if row["installed"] else "-"
                  pkg = row["pkg"] if row["pkg"] else "-"
                  vid = row["id"] if row["id"] else "-"
                  print(f"| `{md_escape(vid)}` | `{md_escape(row['severity'])}` | `{md_escape(pkg)}` | `{md_escape(installed)}` | `{md_escape(fixed)}` |")
          else:
              print("No CRITICAL/HIGH/MEDIUM CVEs detected after rebuild.")

          print()
          print("### Runtime info")
          print()
          print("| Key | Value |")
          print("|---|---|")
          print(f"| PHP version | `{md_escape(info.get('php_version', '-'))}` |")
          print(f"| PHP SAPI | `{md_escape(info.get('php_sapi', '-'))}` |")
          print(f"| PHP binary | `{md_escape(info.get('php_bin', '-'))}` |")
          print(f"| PHP-FPM binary | `{md_escape(info.get('php_fpm_bin', '-'))}` |")
          print(f"| Loaded php.ini | `{md_escape(info.get('loaded_ini', '-'))}` |")
          print(f"| INI scan dir | `{md_escape(info.get('ini_scan_dir', '-'))}` |")
          print(f"| Extension dir | `{md_escape(info.get('extension_dir', '-'))}` |")
          print(f"| Parsed ini files | `{md_escape(ini_show.get('parsed_files_count', '0'))}` |")

          print()
          print("### phpctl diagnostics")
          print()
          print("| Key | Value |")
          print("|---|---|")
          print(f"| ext available dir | `{md_escape(paths.get('ext_available_dir', '-'))}` |")
          print(f"| ext active dir | `{md_escape(paths.get('ext_active_dir', '-'))}` |")
          print(f"| fpm pool available dir | `{md_escape(paths.get('fpm_pool_available_dir', '-'))}` |")
          print(f"| fpm pool active dir | `{md_escape(paths.get('fpm_pool_active_dir', '-'))}` |")
          print(f"| doctor php_fpm_bin | `{md_escape(str(doctor.get('php_fpm_bin', '-')) if isinstance(doctor, dict) else '-')}` |")
          print(f"| self-test php_fpm_test | `{md_escape(str(self_test.get('php_fpm_test', '-')) if isinstance(self_test, dict) else '-')}` |")

          if os.environ["PHP_VARIANT"] == "fpm":
              print(f"| fpm available | `{md_escape(str(fpm_status.get('available', '-')) if isinstance(fpm_status, dict) else '-')}` |")
              print(f"| fpm config ok | `{md_escape(str(fpm_status.get('config_ok', '-')) if isinstance(fpm_status, dict) else '-')}` |")

          print()
          print("### Extension status")
          print()
          print("| Extension | Expected | Installed | Enabled | Loaded | Version | Available ini | Active ini |")
          print("|---|---|---|---|---|---|---|---|")
          for name in ext_names:
              actual = actual_map.get(name, {})
              expected_flag = name in expected
              installed = bool(actual.get("available"))
              active = bool(actual.get("active"))
              loaded = bool(actual.get("loaded"))
              version = actual.get("version", "-")
              available_ini = actual.get("available_ini", "-")
              active_ini = actual.get("active_ini", "-")
              print(
                  f"| `{md_escape(name)}` | {yesno_to_emoji(expected_flag)} | {yesno_to_emoji(installed)} | "
                  f"{yesno_to_emoji(active)} | {yesno_to_emoji(loaded)} | `{md_escape(version)}` | "
                  f"`{md_escape(available_ini)}` | `{md_escape(active_ini)}` |"
              )

          print()
          print("### Extension summary")
          print()
          print(f"- Expected extensions from `pecl.txt`: `{len(expected)}`")
          print(f"- Discovered extensions from image: `{len(actual_map)}`")
          print(f"- Expected but not installed: `{len(expected_missing)}`")
          print(f"- Installed but not expected: `{len(unexpected_installed)}`")
          print(f"- Enabled but not loaded: `{len(active_not_loaded)}`")

          if expected_missing:
              shown = ", ".join(f"`{md_escape(x)}`" for x in expected_missing[:30])
              print(f"- Missing expected extensions: {shown}")
          else:
              print("- Missing expected extensions: none")

          if unexpected_installed:
              shown = ", ".join(f"`{md_escape(x)}`" for x in unexpected_installed[:30])
              print(f"- Unexpected installed extensions: {shown}")
          else:
              print("- Unexpected installed extensions: none")

          if active_not_loaded:
              shown = ", ".join(f"`{md_escape(x)}`" for x in active_not_loaded[:30])
              print(f"- Enabled but not loaded: {shown}")
          else:
              print("- Enabled but not loaded: none")

          print()
          print("### Shared objects in extension_dir")
          print()

          if so_list:
              print("| Module | Path | Size (bytes) |")
              print("|---|---|---:|")
              for row in so_list:
                  name = str(row.get("name") or "-")
                  path = str(row.get("path") or "-")
                  size = str(row.get("size") or "-")
                  print(f"| `{md_escape(name)}` | `{md_escape(path)}` | `{md_escape(size)}` |")
          else:
              print("No `.so` files found in extension_dir.")
          PY

          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-report-${{ matrix.mm }}-${{ matrix.variant }}
          path: ${{ steps.report.outputs.path }}

      - name: Upload phpctl smoke log artifact
        uses: actions/upload-artifact@v7
        with:
          name: phpctl-smoke-${{ matrix.mm }}-${{ matrix.variant }}
          path: ${{ steps.phpctl_smoke.outputs.log }}

      - name: Upload Trivy pre-scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-pre-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-pre.json

      - name: Upload Trivy post-scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-post-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-post.json

      - name: Comment report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('${{ steps.report.outputs.path }}', 'utf8');
            const marker = `<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment => (comment.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  skip:
    name: build and report (no changes)
    needs: discover
    if: needs.discover.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No version Dockerfiles changed
        shell: bash
        run: |
          echo "No changes detected in versions/*/*/Dockerfile. Skipping build."

  ci:
    name: build-php-versions (required)
    needs: [discover, build, skip]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide final status
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "cancelled" ]; then
            echo "Build job failed or was cancelled."
            exit 1
          fi

          echo "CI succeeded."
