name: build-and-test-new-php-versions

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "versions/**"
      - ".github/workflows/build-and-test-new-php-versions.yml"
  push:
    branches:
      - "bot/add-php-*"
    paths:
      - "versions/**"
      - ".github/workflows/build-and-test-new-php-versions.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: build-php-versions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: discover changed versions
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.matrix.outputs.has_changes }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build matrix from changed Dockerfiles
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          changed="$(git diff --name-only "$base" "$head" | grep -E '^versions/[0-9]+\.[0-9]+/[^/]+/Dockerfile$' || true)"

          if [ -z "${changed//[[:space:]]/}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export CHANGED="$changed"

          MATRIX_JSON="$(
            python3 - <<'PY'
            import json
            import os
            import re
            
            changed = os.environ["CHANGED"].splitlines()
            
            include = []
            for path in changed:
                m = re.match(r"^versions/(\d+\.\d+)/([^/]+)/Dockerfile$", path)
                if not m:
                    continue
            
                mm = m.group(1)
                variant = m.group(2)
            
                include.append({
                    "mm": mm,
                    "variant": variant,
                    "context": f"versions/{mm}/{variant}",
                    "dockerfile": f"versions/{mm}/{variant}/Dockerfile",
                    "tag": f"local/php-{mm}-{variant}:report"
                })
            
            print(json.dumps({"include": include}, separators=(",", ":")))
            PY
          )"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build:
    name: build and check
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Prepare lifecycle metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > .lifecycle.env <<EOF
          PHP_BRANCH=${{ matrix.mm }}
          PHP_VERSION=${{ matrix.mm }}
          PHP_EOL=
          IMAGE_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Prepare selected hotfix directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (linux/amd64, linux/arm64) - validation only
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt

      - name: Build local candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}

      - name: Collect phpctl info JSON
        shell: bash
        run: |
          set -euo pipefail

          img="${{ matrix.tag }}"

          echo "== phpctl info =="
          docker run --rm "$img" sh -lc 'phpctl --output json info' > /tmp/phpctl-info.raw
          jq . < /tmp/phpctl-info.raw
          jq -c . < /tmp/phpctl-info.raw > /tmp/phpctl-info.json

          echo "== phpctl version =="
          docker run --rm "$img" sh -lc 'phpctl version' | tee /tmp/phpctl-version.txt

      - name: Validate PHP version
        shell: bash
        env:
          PHP_MM: ${{ matrix.mm }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path
          
          expected = os.environ["PHP_MM"]
          info = json.loads(Path("/tmp/phpctl-info.json").read_text(encoding="utf-8"))
          actual = str(info.get("php_version") or "")
          
          if not actual.startswith(f"{expected}."):
              print(f"❌ Expected PHP {expected}.x, got {actual!r}", file=sys.stderr)
              sys.exit(1)
          
          print(f"✅ PHP version OK: {actual}")
          PY

      - name: Trivy scan candidate (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.tag }}
          format: json
          output: trivy-results-pre.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Detect Alpine versions
        id: alpine
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY' > /tmp/alpine_versions.env
          import re
          import subprocess
          from pathlib import Path
          
          dockerfile_path = Path("${{ matrix.dockerfile }}")
          content = dockerfile_path.read_text(encoding="utf-8", errors="replace")
          
          dockerfile_full = ""
          for line in content.splitlines():
              if not re.match(r"^\s*FROM\s+", line, flags=re.IGNORECASE):
                  continue
              m = re.search(r"alpine:([0-9]+\.[0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
              m = re.search(r"alpine:([0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
              m = re.search(r"alpine([0-9]+\.[0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
              m = re.search(r"alpine([0-9]+\.[0-9]+)", line, flags=re.IGNORECASE)
              if m:
                  dockerfile_full = m.group(1)
                  break
          
          dockerfile_minor = ".".join(dockerfile_full.split(".")[:2]) if dockerfile_full else ""
          
          try:
              image_full = subprocess.check_output(
                  ["docker", "run", "--rm", "--entrypoint", "/bin/sh", "${{ matrix.tag }}", "-lc", "cat /etc/alpine-release"],
                  text=True,
                  stderr=subprocess.DEVNULL,
              ).strip()
          except Exception:
              image_full = ""
          
          image_minor = ".".join(image_full.split(".")[:2]) if image_full else ""
          
          print(f"dockerfile_full={dockerfile_full}")
          print(f"dockerfile_minor={dockerfile_minor}")
          print(f"image_full={image_full}")
          print(f"image_minor={image_minor}")
          PY

          cat /tmp/alpine_versions.env >> "$GITHUB_OUTPUT"

      - name: Select matching hotfixes
        id: hotfixes
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

          mapfile -t CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          declare -a SEARCH_DIRS=()
          add_dir() {
            local dir="$1"
            [ -z "$dir" ] && return 0
            for existing in "${SEARCH_DIRS[@]:-}"; do
              [ "$existing" = "$dir" ] && return 0
            done
            SEARCH_DIRS+=("$dir")
          }

          add_dir "hotfixes/all"
          add_dir "hotfixes/alpine/all"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_full }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_full }}"
          add_dir "hotfixes/php/${{ matrix.mm }}/all"
          add_dir "hotfixes/php/${{ matrix.mm }}/${{ matrix.variant }}"

          declare -a MATCHED_CVES=()
          declare -a UNMATCHED_CVES=()
          declare -a SELECTED_FILES=()

          found=0
          idx=0

          for cve in "${CVES[@]}"; do
            matched_this_cve=0

            for dir in "${SEARCH_DIRS[@]}"; do
              [ -d "$dir" ] || continue
              shopt -s nullglob
              for f in "$dir/${cve}"-*.sh; do
                idx=$((idx + 1))
                dest=".hotfixes-selected/$(printf '%03d' "$idx")-$(basename "$f")"
                cp "$f" "$dest"
                SELECTED_FILES+=("$f")
                matched_this_cve=1
                found=1
              done
              shopt -u nullglob
            done

            if [ "$matched_this_cve" -eq 1 ]; then
              MATCHED_CVES+=("$cve")
            else
              UNMATCHED_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          if [ "$found" -eq 1 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matched_cves=$(joined "${MATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "unmatched_cves=$(joined "${UNMATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "selected_count=${#SELECTED_FILES[@]}" >> "$GITHUB_OUTPUT"

      - name: Rebuild local image with selected hotfixes
        if: steps.hotfixes.outputs.enabled == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: ${{ matrix.tag }}

      - name: Trivy scan final image (JSON)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.tag }}
          format: json
          output: trivy-results-post.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Analyze remediation result
        id: remediation
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t PRE_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          mapfile -t POST_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-post.json | sort -u
          )

          declare -A PRE_SET=()
          declare -A POST_SET=()

          for cve in "${PRE_CVES[@]}"; do
            PRE_SET["$cve"]=1
          done
          for cve in "${POST_CVES[@]}"; do
            POST_SET["$cve"]=1
          done

          declare -a FIXED_CVES=()
          declare -a REMAINING_CVES=()
          declare -a NEW_CVES=()

          for cve in "${PRE_CVES[@]}"; do
            if [ -n "${POST_SET[$cve]:-}" ]; then
              REMAINING_CVES+=("$cve")
            else
              FIXED_CVES+=("$cve")
            fi
          done

          for cve in "${POST_CVES[@]}"; do
            if [ -z "${PRE_SET[$cve]:-}" ]; then
              NEW_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          echo "fixed_cves=$(joined "${FIXED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "remaining_cves=$(joined "${REMAINING_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "new_cves=$(joined "${NEW_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "fixed_count=${#FIXED_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "remaining_count=${#REMAINING_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "new_count=${#NEW_CVES[@]}" >> "$GITHUB_OUTPUT"

      - name: Generate PR report
        id: report
        shell: bash
        env:
          PHP_MM: ${{ matrix.mm }}
          PHP_VARIANT: ${{ matrix.variant }}
          IMAGE_TAG: ${{ matrix.tag }}
          HOTFIX_ENABLED: ${{ steps.hotfixes.outputs.enabled }}
          HOTFIX_MATCHED_CVES: ${{ steps.hotfixes.outputs.matched_cves }}
          HOTFIX_UNMATCHED_CVES: ${{ steps.hotfixes.outputs.unmatched_cves }}
          HOTFIX_SELECTED_COUNT: ${{ steps.hotfixes.outputs.selected_count }}
          REM_FIXED_COUNT: ${{ steps.remediation.outputs.fixed_count }}
          REM_REMAINING_COUNT: ${{ steps.remediation.outputs.remaining_count }}
          REM_NEW_COUNT: ${{ steps.remediation.outputs.new_count }}
        run: |
          set -euo pipefail

          out="/tmp/php-report-${{ matrix.mm }}-${{ matrix.variant }}.md"

          python3 - <<'PY' > "$out"
          import json
          import os
          from pathlib import Path
          
          def load_json(path):
              return json.loads(Path(path).read_text(encoding="utf-8"))
          
          def counts(obj):
              result = {"CRITICAL": 0, "HIGH": 0, "MEDIUM": 0}
              for res in obj.get("Results", []) or []:
                  for vuln in res.get("Vulnerabilities", []) or []:
                      sev = str(vuln.get("Severity") or "").upper()
                      if sev in result:
                          result[sev] += 1
              return result
          
          severity_rank = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3, "UNKNOWN": 4}
          
          def remaining_rows(obj):
              rows = []
              seen = set()
              for res in obj.get("Results", []) or []:
                  for vuln in res.get("Vulnerabilities", []) or []:
                      sev = str(vuln.get("Severity") or "UNKNOWN").upper()
                      if sev not in ("CRITICAL", "HIGH", "MEDIUM"):
                          continue
                      vid = str(vuln.get("VulnerabilityID") or "")
                      pkg = str(vuln.get("PkgName") or "")
                      installed = str(vuln.get("InstalledVersion") or "")
                      fixed = str(vuln.get("FixedVersion") or "")
                      key = (vid, pkg, installed, fixed, sev)
                      if key in seen:
                          continue
                      seen.add(key)
                      rows.append({
                          "id": vid,
                          "pkg": pkg,
                          "severity": sev,
                          "installed": installed,
                          "fixed": fixed,
                      })
              rows.sort(key=lambda r: (severity_rank.get(r["severity"], 9), r["pkg"], r["id"]))
              return rows
          
          def md_escape(text):
              return str(text).replace("|", "\\|")
          
          pre = load_json("trivy-results-pre.json")
          post = load_json("trivy-results-post.json")
          info = load_json("/tmp/phpctl-info.json")
          phpctl_version = Path("/tmp/phpctl-version.txt").read_text(encoding="utf-8").strip()
          
          pre_counts = counts(pre)
          post_counts = counts(post)
          rows = remaining_rows(post)[:15]
          
          php_version = str(info.get("php_version") or "")
          expected_prefix = f"{os.environ['PHP_MM']}."
          version_ok = php_version.startswith(expected_prefix)
          
          hotfix_enabled = os.environ.get("HOTFIX_ENABLED", "")
          matched = [x for x in os.environ.get("HOTFIX_MATCHED_CVES", "").split(",") if x]
          unmatched = [x for x in os.environ.get("HOTFIX_UNMATCHED_CVES", "").split(",") if x]
          selected_count = os.environ.get("HOTFIX_SELECTED_COUNT", "0")
          fixed_count = os.environ.get("REM_FIXED_COUNT", "0")
          remaining_count = os.environ.get("REM_REMAINING_COUNT", "0")
          new_count = os.environ.get("REM_NEW_COUNT", "0")
          
          status_emoji = "✅" if version_ok else "❌"
          
          print(f"<!-- php-report:{os.environ['PHP_MM']}:{os.environ['PHP_VARIANT']} -->")
          print(f"## {status_emoji} PHP PR check: `{os.environ['PHP_MM']}` / `{os.environ['PHP_VARIANT']}`")
          print()
          print(f"**Image (local):** `{os.environ['IMAGE_TAG']}`")
          print()
          print(f"**phpctl:** `{phpctl_version}`")
          print()
          
          print("### PHP version check")
          print()
          print(f"- Expected: `{expected_prefix}x`")
          print(f"- Actual: `{php_version or '-'}`")
          print(f"- Result: `{'PASS ✅' if version_ok else 'FAIL ❌'}`")
          print()
          
          print("### Security summary")
          print()
          print("| Stage | Critical | High | Medium |")
          print("|---|---:|---:|---:|")
          print(f"| Before hotfixes | {pre_counts['CRITICAL']} | {pre_counts['HIGH']} | {pre_counts['MEDIUM']} |")
          print(f"| After hotfixes | {post_counts['CRITICAL']} | {post_counts['HIGH']} | {post_counts['MEDIUM']} |")
          print()
          
          print("### Hotfix matching")
          print()
          print(f"- Hotfix scripts selected: `{selected_count}`")
          print(f"- Matching hotfix CVEs found: `{'yes ✅' if matched else 'no ❌'}`")
          print(f"- Hotfix rebuild performed: `{'yes ✅' if hotfix_enabled == 'true' else 'no'}`")
          print(f"- Fixed CVEs after rebuild: `{fixed_count}`")
          print(f"- Remaining CVEs after rebuild: `{remaining_count}`")
          print(f"- New CVEs after rebuild: `{new_count}`")
          print()
          
          if matched:
              shown = ", ".join(f"`{x}`" for x in matched[:20])
              print(f"- Matched CVEs: {shown}")
          else:
              print("- Matched CVEs: none")
          
          if unmatched:
              shown = ", ".join(f"`{x}`" for x in unmatched[:20])
              print(f"- Unmatched CVEs: {shown}")
          else:
              print("- Unmatched CVEs: none")
          
          print()
          print("### Runtime info")
          print()
          print("| Key | Value |")
          print("|---|---|")
          print(f"| PHP version | `{md_escape(info.get('php_version', '-'))}` |")
          print(f"| PHP SAPI | `{md_escape(info.get('php_sapi', '-'))}` |")
          print(f"| PHP binary | `{md_escape(info.get('php_bin', '-'))}` |")
          print(f"| PHP-FPM binary | `{md_escape(info.get('php_fpm_bin', '-'))}` |")
          print(f"| Loaded php.ini | `{md_escape(info.get('loaded_ini', '-'))}` |")
          print(f"| INI scan dir | `{md_escape(info.get('ini_scan_dir', '-'))}` |")
          print(f"| Extension dir | `{md_escape(info.get('extension_dir', '-'))}` |")
          print()
          
          print("### Top remaining CVEs")
          print()
          
          if rows:
              print("| CVE | Severity | Package | Installed | Fixed version |")
              print("|---|---|---|---|---|")
              for row in rows:
                  fixed = row["fixed"] if row["fixed"] else "-"
                  installed = row["installed"] if row["installed"] else "-"
                  pkg = row["pkg"] if row["pkg"] else "-"
                  vid = row["id"] if row["id"] else "-"
                  print(f"| `{md_escape(vid)}` | `{md_escape(row['severity'])}` | `{md_escape(pkg)}` | `{md_escape(installed)}` | `{md_escape(fixed)}` |")
          else:
              print("No CRITICAL/HIGH/MEDIUM CVEs detected after rebuild.")
          PY

          echo "path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-report-${{ matrix.mm }}-${{ matrix.variant }}
          path: ${{ steps.report.outputs.path }}

      - name: Upload Trivy pre-scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-pre-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-pre.json

      - name: Upload Trivy post-scan artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-post-${{ matrix.mm }}-${{ matrix.variant }}
          path: trivy-results-post.json

      - name: Comment report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const body = fs.readFileSync('${{ steps.report.outputs.path }}', 'utf8');
            const marker = `<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(comment => (comment.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  skip:
    name: build and check (no changes)
    needs: discover
    if: needs.discover.outputs.has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: No version Dockerfiles changed
        shell: bash
        run: |
          echo "No changes detected in versions/*/*/Dockerfile. Skipping build."

  ci:
    name: build-php-versions (required)
    needs: [discover, build, skip]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide final status
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.build.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "cancelled" ]; then
            echo "Build job failed or was cancelled."
            exit 1
          fi

          echo "CI succeeded."
