name: build-php-images

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "web/badges/**"
      - "web/reports/**"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish destination"
        required: false
        default: "ghcr"
        type: choice
        options: [ghcr, custom]
      custom_namespace:
        description: "Custom namespace override (e.g. registry.example.com/team)"
        required: false
        default: ""

env:
  IMAGE_NAME: php
  SITE_BASE_URL: https://php-images.masiarek.dev

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
      phps: ${{ steps.gen.outputs.phps }}
      full: ${{ steps.gen.outputs.full }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate build matrix from versions/ tree
        id: gen
        shell: bash
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path

          root = Path("versions")
          if not root.exists():
            raise SystemExit("versions/ directory not found")

          event = os.environ.get("GITHUB_EVENT_NAME", "")
          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          sha = os.environ.get("GITHUB_SHA", "")

          def all_php_versions() -> list[str]:
            return sorted([p.name for p in root.iterdir() if p.is_dir()])

          def dockerfiles_for_php(php: str) -> list[Path]:
            return sorted((root / php).glob("*/*/Dockerfile")) if (root / php).exists() else []

          changed = None
          if event in ("schedule", "workflow_dispatch"):
            changed = None
          elif event == "push" and before and before != "0000000000000000000000000000000000000000":
            out = subprocess.check_output(["git", "diff", "--name-only", f"{before}..{sha}"], text=True)
            changed = [p.strip() for p in out.splitlines() if p.strip()]
          else:
            changed = None

          full_build = False
          touched_phps: set[str] = set()

          if changed is None:
            full_build = True
          else:
            if ".github/workflows/build.yml" in changed:
              full_build = True
            else:
              for p in changed:
                if p.startswith("versions/"):
                  parts = p.split("/", 2)
                  if len(parts) >= 2 and parts[1]:
                    touched_phps.add(parts[1])
                else:
                  full_build = True

          include = []
          phps_to_build: list[str] = []

          if full_build:
            phps_to_build = all_php_versions()
            dockerfiles = sorted(root.glob("*/*/Dockerfile"))
          else:
            phps_to_build = sorted(touched_phps)
            dockerfiles = []
            for php in phps_to_build:
              dockerfiles.extend(dockerfiles_for_php(php))
            dockerfiles = sorted(set(dockerfiles))

          for dockerfile in dockerfiles:
            php = dockerfile.parts[1]
            variant = dockerfile.parts[2]
            context_dir = dockerfile.parent
            include.append({
              "php": php,
              "variant": variant,
              "context": str(context_dir),
            })

          matrix = {"include": include}

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as fh:
            fh.write("matrix=" + json.dumps(matrix) + "\n")
            fh.write("count=" + str(len(include)) + "\n")
            fh.write("phps=" + json.dumps(phps_to_build) + "\n")
            fh.write("full=" + ("true" if full_build else "false") + "\n")
          PY

  build:
    needs: matrix
    if: needs.matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Decide publish namespace
        id: ns
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.publish_target }}"
          [ -z "$TARGET" ] && TARGET="ghcr"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

          if [ "$TARGET" = "custom" ]; then
            if [ -z "${{ secrets.REGISTRY_HOST }}" ] || [ -z "${{ secrets.REGISTRY_USERNAME }}" ] || [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then
              echo "Missing secrets: REGISTRY_HOST/REGISTRY_USERNAME/REGISTRY_PASSWORD" >&2
              exit 1
            fi

            if [ -n "${{ github.event.inputs.custom_namespace }}" ]; then
              NAMESPACE="${{ github.event.inputs.custom_namespace }}"
            else
              if [ -n "${{ secrets.IMAGE_NAMESPACE }}" ]; then
                NAMESPACE="${{ secrets.REGISTRY_HOST }}/${{ secrets.IMAGE_NAMESPACE }}"
              else
                NAMESPACE="${{ secrets.REGISTRY_HOST }}/${{ github.repository_owner }}"
              fi
            fi
            echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=ghcr.io/${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to custom registry
        if: steps.ns.outputs.target == 'custom'
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY_HOST }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Login to GHCR
        if: steps.ns.outputs.target == 'ghcr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          PREFIX="${{ matrix.php }}-${{ matrix.variant }}"
          ./scripts/compute-tags.sh "${{ steps.ns.outputs.namespace }}" "${{ env.IMAGE_NAME }}" "$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Docker meta (OCI labels/annotations)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.namespace }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=php
            org.opencontainers.image.description=Alpine-based multi-arch PHP images (${{ matrix.php }} / ${{ matrix.variant }})
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push (multi-arch)
        id: buildpush
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: |
            ${{ steps.tags.outputs.TAG_MOVING }}
            ${{ steps.tags.outputs.TAG_DATE }}
            ${{ steps.tags.outputs.TAG_SHA }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.php }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.php }}-${{ matrix.variant }}

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.tags.outputs.TAG_SHA }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy scan (JSON)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.tags.outputs.TAG_SHA }}
          format: json
          output: trivy-results.json
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Fetch Trivy HTML template
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -o trivy-html.tpl

      - name: Trivy scan (HTML report)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.tags.outputs.TAG_SHA }}
          format: template
          template: "@trivy-html.tpl"
          output: trivy-report.html
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Write image + Trivy artifacts
        shell: bash
        run: |
          set -euo pipefail

          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          MED=$(jq  '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)

          mkdir -p out

          META="out/image-meta-${{ matrix.php }}-${{ matrix.variant }}.txt"
          SUM="out/trivy-summary-${{ matrix.php }}-${{ matrix.variant }}.txt"

          cat > "${META}" <<EOF
          php=${{ matrix.php }}
          variant=${{ matrix.variant }}
          image_sha=${{ steps.tags.outputs.TAG_SHA }}
          image_date=${{ steps.tags.outputs.TAG_DATE }}
          image_moving=${{ steps.tags.outputs.TAG_MOVING }}
          digest=${{ steps.buildpush.outputs.digest }}
          EOF

          cat > "${SUM}" <<EOF
          php=${{ matrix.php }}
          variant=${{ matrix.variant }}
          image_sha=${{ steps.tags.outputs.TAG_SHA }}
          digest=${{ steps.buildpush.outputs.digest }}
          critical=${CRIT}
          high=${HIGH}
          medium=${MED}
          EOF

          cp trivy-report.html "out/trivy-${{ matrix.php }}-${{ matrix.variant }}.html"

      - uses: actions/upload-artifact@v7
        with:
          name: image-meta-${{ matrix.php }}-${{ matrix.variant }}
          path: out/image-meta-${{ matrix.php }}-${{ matrix.variant }}.txt
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: trivy-summary-${{ matrix.php }}-${{ matrix.variant }}
          path: out/trivy-summary-${{ matrix.php }}-${{ matrix.variant }}.txt
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: trivy-report-${{ matrix.php }}-${{ matrix.variant }}
          path: out/trivy-${{ matrix.php }}-${{ matrix.variant }}.html
          if-no-files-found: error

  publish_release_and_web:
    needs: [matrix, build]
    if: github.ref == 'refs/heads/main' && needs.matrix.outputs.count != '0' && (github.event.inputs.publish_target == '' || github.event.inputs.publish_target == 'ghcr')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download image metadata artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: image-meta-*
          path: artifacts/image-meta
          merge-multiple: true

      - name: Download Trivy summary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: trivy-summary-*
          path: artifacts/trivy
          merge-multiple: true

      - name: Download Trivy HTML report artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: trivy-report-*
          path: artifacts/trivy-html
          merge-multiple: true

      - name: Create versioned releases (per PHP)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SITE_BASE_URL: ${{ env.SITE_BASE_URL }}
        shell: bash
        run: |
          set -euo pipefail

          PHPS_JSON='${{ needs.matrix.outputs.phps }}'
          if [ -z "$PHPS_JSON" ] || [ "$PHPS_JSON" = "null" ]; then
            echo "No PHP versions to release."
            exit 0
          fi

          mapfile -t PHPS < <(printf '%s' "$PHPS_JSON" | jq -r '.[]' | sort -V)
          if [ "${#PHPS[@]}" -eq 0 ]; then
            echo "No PHP versions to release."
            exit 0
          fi

          find_image_meta() {
            local php="$1" var="$2"
            local f
            for f in artifacts/image-meta/*.txt; do
              [ -e "$f" ] || continue
              if grep -q "^php=${php}$" "$f" && grep -q "^variant=${var}$" "$f"; then
                echo "$f"
                return 0
              fi
            done
            return 1
          }

          find_trivy_sum() {
            local php="$1" var="$2"
            local f
            for f in artifacts/trivy/*.txt; do
              [ -e "$f" ] || continue
              if grep -q "^php=${php}$" "$f" && grep -q "^variant=${var}$" "$f"; then
                echo "$f"
                return 0
              fi
            done
            return 1
          }

          for PHP in "${PHPS[@]}"; do
            if [ ! -d "versions/${PHP}" ]; then
              echo "versions/${PHP} not found, skipping release."
              continue
            fi

            mapfile -t VARIANTS < <(find "versions/${PHP}" -mindepth 2 -maxdepth 2 -type f -name Dockerfile -printf '%h\n' | awk -F/ '{print $3}' | sort -u)
            if [ "${#VARIANTS[@]}" -eq 0 ]; then
              echo "No variants found for PHP ${PHP}, skipping."
              continue
            fi

            for V in "${VARIANTS[@]}"; do
              if ! find_image_meta "$PHP" "$V" >/dev/null; then
                echo "Missing image-meta for ${PHP}/${V}; refusing to create incomplete release."
                exit 1
              fi
              if ! find_trivy_sum "$PHP" "$V" >/dev/null; then
                echo "Missing trivy summary for ${PHP}/${V}; refusing to create incomplete release."
                exit 1
              fi
              if [ ! -f "artifacts/trivy-html/trivy-${PHP}-${V}.html" ]; then
                echo "Missing trivy HTML report for ${PHP}/${V}; refusing to create incomplete release."
                exit 1
              fi
            done

            TAG="php-${PHP}-$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
            NOTES="release-notes-${PHP}.md"

            {
              echo "## PHP ${PHP} images"
              echo ""
              echo "### Pull"
              echo ""
              echo "| Variant | Moving | Date | SHA | Digest |"
              echo "|---|---|---|---|---|"
              for V in "${VARIANTS[@]}"; do
                F="$(find_image_meta "$PHP" "$V")"
                SHA=$(grep '^image_sha=' "$F" | cut -d= -f2)
                DATE=$(grep '^image_date=' "$F" | cut -d= -f2)
                MOV=$(grep '^image_moving=' "$F" | cut -d= -f2)
                DIG=$(grep '^digest=' "$F" | cut -d= -f2)
                echo "| \`${V}\` | \`${MOV}\` | \`${DATE}\` | \`${SHA}\` | \`${DIG}\` |"
              done

              echo ""
              echo "### Trivy (ignore-unfixed; CRITICAL/HIGH/MEDIUM)"
              echo ""
              echo "| Variant | Image (sha@digest) | CRITICAL | HIGH | MEDIUM | Report |"
              echo "|---|---|---:|---:|---:|---|"
              for V in "${VARIANTS[@]}"; do
                T="$(find_trivy_sum "$PHP" "$V")"
                IMG=$(grep '^image_sha=' "$T" | cut -d= -f2)
                DIG=$(grep '^digest=' "$T" | cut -d= -f2)
                C=$(grep '^critical=' "$T" | cut -d= -f2)
                H=$(grep '^high=' "$T" | cut -d= -f2)
                M=$(grep '^medium=' "$T" | cut -d= -f2)
                R="${SITE_BASE_URL}/reports/trivy-${PHP}-${V}.html"
                echo "| \`${V}\` | \`${IMG}@${DIG}\` | $C | $H | $M | ${R} |"
              done

              echo ""
              echo "### Badges"
              echo ""
              echo "- Total: ${SITE_BASE_URL}/badges/trivy-total.json"
              for V in "${VARIANTS[@]}"; do
                echo "- ${PHP}/${V}: ${SITE_BASE_URL}/badges/trivy-${PHP}-${V}.json"
              done
            } > "$NOTES"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists, skipping."
              continue
            fi

            gh release create "$TAG" \
              --title "${PHP}" \
              --notes-file "$NOTES"
          done

      - name: Update web badges and reports (commit to main)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p web/badges web/reports

          for f in artifacts/trivy/*.txt; do
            [ -e "$f" ] || continue

            PHP=$(grep '^php=' "$f" | cut -d= -f2)
            VAR=$(grep '^variant=' "$f" | cut -d= -f2)
            C=$(grep '^critical=' "$f" | cut -d= -f2)
            H=$(grep '^high=' "$f" | cut -d= -f2)
            M=$(grep '^medium=' "$f" | cut -d= -f2)

            COLOR="brightgreen"
            if [ "$C" -gt 0 ]; then
              COLOR="red"
            elif [ "$H" -gt 0 ]; then
              COLOR="orange"
            elif [ "$M" -gt 0 ]; then
              COLOR="yellow"
            fi

            cat > "web/badges/trivy-${PHP}-${VAR}.json" <<EOF
          {"schemaVersion":1,"label":"trivy","message":"C:${C} H:${H} M:${M}","color":"${COLOR}","critical":${C},"high":${H},"medium":${M},"php":"${PHP}","variant":"${VAR}"}
          EOF

            if [ -f "artifacts/trivy-html/trivy-${PHP}-${VAR}.html" ]; then
              cp "artifacts/trivy-html/trivy-${PHP}-${VAR}.html" "web/reports/trivy-${PHP}-${VAR}.html"
            fi
          done

          TOTAL_C=$(jq -s '[.[].critical] | add // 0' web/badges/trivy-*.json 2>/dev/null || echo 0)
          TOTAL_H=$(jq -s '[.[].high]     | add // 0' web/badges/trivy-*.json 2>/dev/null || echo 0)
          TOTAL_M=$(jq -s '[.[].medium]   | add // 0' web/badges/trivy-*.json 2>/dev/null || echo 0)

          TOTAL_COLOR="brightgreen"
          if [ "$TOTAL_C" -gt 0 ]; then
            TOTAL_COLOR="red"
          elif [ "$TOTAL_H" -gt 0 ]; then
            TOTAL_COLOR="orange"
          elif [ "$TOTAL_M" -gt 0 ]; then
            TOTAL_COLOR="yellow"
          fi

          cat > web/badges/trivy-total.json <<EOF
          {"schemaVersion":1,"label":"trivy","message":"C:${TOTAL_C} H:${TOTAL_H} M:${TOTAL_M}","color":"${TOTAL_COLOR}","critical":${TOTAL_C},"high":${TOTAL_H},"medium":${TOTAL_M}}
          EOF

          PHP_VERSIONS=$(ls -1 versions 2>/dev/null | sort -V | paste -sd '|' -)
          [ -z "$PHP_VERSIONS" ] && PHP_VERSIONS="unknown"
          cat > web/badges/php.json <<EOF
          {"schemaVersion":1,"label":"php","message":"${PHP_VERSIONS}","color":"blue"}
          EOF

          BUILT="$(date -u +%Y-%m-%d)"
          cat > web/badges/built.json <<EOF
          {"schemaVersion":1,"label":"built","message":"${BUILT}","color":"blue"}
          EOF

          IMAGES_COUNT=$(ls -1 web/badges/trivy-*.json 2>/dev/null | wc -l | tr -d ' ')
          cat > web/badges/images.json <<EOF
          {"schemaVersion":1,"label":"images","message":"${IMAGES_COUNT}","color":"blue"}
          EOF

          {
            echo "<!doctype html>"
            echo "<html><head><meta charset='utf-8'/>"
            echo "<meta name='viewport' content='width=device-width, initial-scale=1'/>"
            echo "<title>Trivy reports</title>"
            echo "<style>body{font-family:system-ui,Arial,sans-serif;max-width:900px;margin:24px auto;padding:0 16px} li{margin:6px 0} code{background:#f3f3f3;padding:2px 6px;border-radius:6px}</style>"
            echo "</head><body>"
            echo "<h1>Trivy HTML reports</h1>"
            echo "<ul>"
            for f in web/reports/trivy-*.html; do
              [ -e "$f" ] || continue
              base="$(basename "$f")"
              echo "<li><a href='./${base}'>${base}</a></li>"
            done
            echo "</ul>"
            echo "</body></html>"
          } > web/reports/index.html

          {
            echo "<!doctype html>"
            echo "<html><head><meta charset='utf-8'/>"
            echo "<meta name='viewport' content='width=device-width, initial-scale=1'/>"
            echo "<title>Badges</title>"
            echo "<style>body{font-family:system-ui,Arial,sans-serif;max-width:900px;margin:24px auto;padding:0 16px} li{margin:6px 0} code{background:#f3f3f3;padding:2px 6px;border-radius:6px}</style>"
            echo "</head><body>"
            echo "<h1>Badges</h1>"
            echo "<ul>"
            for f in web/badges/*.json; do
              [ -e "$f" ] || continue
              base="$(basename "$f")"
              echo "<li><a href='./${base}'>${base}</a></li>"
            done
            echo "</ul>"
            echo "</body></html>"
          } > web/badges/index.html

          git add web/badges web/reports

          if git diff --cached --quiet; then
            echo "No web output changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(web): update badges and reports"
          git push
