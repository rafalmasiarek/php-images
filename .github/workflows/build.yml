name: build-php-images

on:
  push:
    branches: ["main"]
    paths:
      - "versions/**"
      - "rootfs/**"
      - "hotfixes/**"
      - "build-php-images-sanity.yaml"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish destination"
        required: false
        default: "ghcr"
        type: choice
        options: [ghcr, custom]
      deploy_target:
        description: "Where to deploy the generated site"
        required: false
        default: "pages"
        type: choice
        options: [pages, rsync]
      custom_namespace:
        description: "Custom namespace override (e.g. registry.example.com/team)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: build-php-images-sanity-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: php
  SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}

jobs:
  discover:
    name: discover work
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      count: ${{ steps.gen.outputs.count }}
      phps: ${{ steps.gen.outputs.phps }}
      full: ${{ steps.gen.outputs.full }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate build matrix and execution plan
        id: gen
        shell: bash
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path
          
          root = Path("versions")
          if not root.exists():
              raise SystemExit("versions/ directory not found")
          
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          before = os.environ.get("GITHUB_EVENT_BEFORE", "")
          sha = os.environ.get("GITHUB_SHA", "")
          
          def all_php_versions() -> list[str]:
              return sorted([p.name for p in root.iterdir() if p.is_dir()])
          
          def dockerfiles_for_php(php: str) -> list[Path]:
              return sorted((root / php).glob("*/Dockerfile")) if (root / php).exists() else []
          
          changed: list[str] | None = None
          if event in ("schedule", "workflow_dispatch"):
              changed = None
          elif event == "push" and before and before != "0000000000000000000000000000000000000000":
              out = subprocess.check_output(["git", "diff", "--name-only", f"{before}..{sha}"], text=True)
              changed = [p.strip() for p in out.splitlines() if p.strip()]
          else:
              changed = None
          
          full_build = False
          touched_phps: set[str] = set()
          
          if changed is None:
              full_build = True
          else:
              for path in changed:
                  if path.startswith("versions/"):
                      parts = path.split("/")
                      if len(parts) >= 2 and parts[1]:
                          touched_phps.add(parts[1])
                          continue
          
                  if path.startswith("hotfixes/all/") or path.startswith("hotfixes/alpine/"):
                      full_build = True
                      continue
          
                  if path.startswith("hotfixes/php/"):
                      parts = path.split("/")
                      if len(parts) >= 3 and parts[2]:
                          touched_phps.add(parts[2])
                          continue
          
                  if path.startswith("rootfs/"):
                      full_build = True
                      continue
          
                  if path in {
                      ".github/workflows/build.yml",
                      ".github/workflows/build-php-images-sanity.yml",
                      "scripts/compute-tags.sh",
                  }:
                      full_build = True
                      continue
          
          include = []
          phps_to_build: list[str]
          
          if full_build:
              phps_to_build = all_php_versions()
              dockerfiles = sorted(root.glob("*/*/Dockerfile"))
          else:
              phps_to_build = sorted(touched_phps)
              dockerfiles = []
              for php in phps_to_build:
                  dockerfiles.extend(dockerfiles_for_php(php))
              dockerfiles = sorted(set(dockerfiles))
          
          for dockerfile in dockerfiles:
              php = dockerfile.parts[1]
              variant = dockerfile.parts[2]
              include.append({
                  "php": php,
                  "variant": variant,
                  "context": f"versions/{php}/{variant}",
                  "dockerfile": f"versions/{php}/{variant}/Dockerfile",
              })
          
          matrix = {"include": include}
          
          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as fh:
              fh.write("matrix=" + json.dumps(matrix) + "\n")
              fh.write("count=" + str(len(include)) + "\n")
              fh.write("phps=" + json.dumps(phps_to_build) + "\n")
              fh.write("full=" + ("true" if full_build else "false") + "\n")
          PY

  build:
    name: build and scan images
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      issues: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Decide publish namespace
        id: ns
        shell: bash
        run: |
          set -euo pipefail

          TARGET="${{ github.event.inputs.publish_target }}"
          [ -z "$TARGET" ] && TARGET="ghcr"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

          if [ "$TARGET" = "custom" ]; then
            if [ -z "${{ secrets.REGISTRY_HOST }}" ] || [ -z "${{ secrets.REGISTRY_USERNAME }}" ] || [ -z "${{ secrets.REGISTRY_PASSWORD }}" ]; then
              echo "Missing secrets: REGISTRY_HOST / REGISTRY_USERNAME / REGISTRY_PASSWORD" >&2
              exit 1
            fi

            if [ -n "${{ github.event.inputs.custom_namespace }}" ]; then
              NAMESPACE="${{ github.event.inputs.custom_namespace }}"
            elif [ -n "${{ secrets.IMAGE_NAMESPACE }}" ]; then
              NAMESPACE="${{ secrets.REGISTRY_HOST }}/${{ secrets.IMAGE_NAMESPACE }}"
            else
              NAMESPACE="${{ secrets.REGISTRY_HOST }}/${{ github.repository_owner }}"
            fi

            echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          else
            echo "namespace=ghcr.io/${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Define cache refs
        id: cache
        shell: bash
        run: |
          set -euo pipefail
          echo "ref=${{ steps.ns.outputs.namespace }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.php }}-${{ matrix.variant }}" >> "$GITHUB_OUTPUT"

      - name: Login to custom registry
        if: steps.ns.outputs.target == 'custom'
        shell: bash
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY_HOST }}" -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Login to GHCR
        if: steps.ns.outputs.target == 'ghcr'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Trivy data
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ runner.arch }}-latest

      - name: Install Trivy CLI
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Cache sanityctl
        uses: actions/cache@v4
        with:
          path: ~/.cache/sanityctl
          key: sanityctl-${{ runner.os }}-${{ runner.arch }}-latest

      - name: Install sanityctl
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) asset="sanityctl-linux-amd64" ;;
            aarch64|arm64) asset="sanityctl-linux-arm64" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac
          cache_dir="${HOME}/.cache/sanityctl"
          mkdir -p "$cache_dir"
          base="https://github.com/rafalmasiarek/py-sanityctl/releases/download/latest"
          if [ ! -f "${cache_dir}/${asset}" ]; then
            curl -fsSL -o "${cache_dir}/${asset}" "$base/$asset"
          fi
          if [ ! -f "${cache_dir}/SHA256SUMS.txt" ]; then
            curl -fsSL -o "${cache_dir}/SHA256SUMS.txt" "$base/SHA256SUMS.txt"
          fi
          grep " $asset\$" "${cache_dir}/SHA256SUMS.txt" | sed "s#  $asset#  ${cache_dir}/${asset}#" | sha256sum -c -
          sudo install -m 0755 "${cache_dir}/${asset}" /usr/local/bin/sanityctl
          sanityctl --help &> /dev/null

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          PREFIX="${{ matrix.php }}-${{ matrix.variant }}"
          ./scripts/compute-tags.sh "${{ steps.ns.outputs.namespace }}" "${{ env.IMAGE_NAME }}" "$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Fetch PHP lifecycle data
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/fetch-php-eol.py

      - name: Prepare lifecycle metadata
        id: lifecycle
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path
          
          php = "${{ matrix.php }}"
          src = Path("web/_data/php-eol.json")
          dst = Path(".lifecycle.env")
          
          version = php
          eol = ""
          
          if src.exists():
              obj = json.loads(src.read_text(encoding="utf-8"))
              info = obj.get(php, {})
              version = str(info.get("version") or php)
              eol = str(info.get("eol") or "")
          
          built_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          
          dst.write_text(
              "\n".join(
                  [
                      f"PHP_BRANCH={php}",
                      f"PHP_VERSION={version}",
                      f"PHP_EOL={eol}",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"eol={eol}\n")
              fh.write(f"built_at={built_at}\n")
          PY

      - name: Print lifecycle metadata
        shell: bash
        run: |
          set -euo pipefail

          EOL="${{ steps.lifecycle.outputs.eol }}"
          [ -z "$EOL" ] && EOL="unknown"

          {
            echo "### PHP lifecycle"
            echo "- PHP: \`${{ matrix.php }}\`"
            echo "- Version: \`${{ steps.lifecycle.outputs.version }}\`"
            echo "- EOL: \`${EOL}\`"
            echo "- Built at: \`${{ steps.lifecycle.outputs.built_at }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.ns.outputs.namespace }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=php
            org.opencontainers.image.description=Alpine-based multi-arch PHP images (${{ matrix.php }} / ${{ matrix.variant }})
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ steps.lifecycle.outputs.version }}
            org.opencontainers.image.created=${{ steps.lifecycle.outputs.built_at }}
            org.opencontainers.image.php.branch=${{ matrix.php }}
            org.opencontainers.image.php.eol=${{ steps.lifecycle.outputs.eol }}

      - name: Prepare selected hotfix directory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected

      - name: Build local candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          pull: true
          platforms: linux/amd64
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: local/${{ env.IMAGE_NAME }}:${{ matrix.php }}-${{ matrix.variant }}-candidate
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ matrix.php }}-${{ matrix.variant }}
            type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.php }}-${{ matrix.variant }}

      - name: Collect data for sanity checks
        shell: bash
        env:
          IMAGE_TAG: local/${{ env.IMAGE_NAME }}:${{ matrix.php }}-${{ matrix.variant }}-candidate
        run: |
          set -euo pipefail

          rm -rf .sanity-cache
          mkdir -p .sanity-cache

          docker run --rm \
            -v "$PWD/.sanity-cache:/out" \
            "$IMAGE_TAG" \
            sh -lc '
              set -euo pipefail

              phpctl version > /out/phpctl-version.txt
              phpctl --output json info > /out/phpctl-info.json
              phpctl --output json ext versions > /out/phpctl-ext-versions.json
              phpctl --output json ext list > /out/phpctl-ext-list.json
              php -v > /out/php-v.txt
              php -m > /out/php-m.txt
              cat /etc/alpine-release > /out/alpine-release.txt
            '

      - name: Run sanityctl checks
        id: phpctl_check
        shell: bash
        env:
          IMAGE_TAG: local/${{ env.IMAGE_NAME }}:${{ matrix.php }}-${{ matrix.variant }}-candidate
          PHP_MM: ${{ matrix.php }}
          PECL_FILE: versions/${{ matrix.php }}/${{ matrix.variant }}/pecl.txt
        run: |
          set -euo pipefail

          log="/tmp/phpctl-check-${{ matrix.php }}-${{ matrix.variant }}.txt"

          {
            echo "<!-- php-report:${{ matrix.mm }}:${{ matrix.variant }} -->"
            echo "### sanityctl validation for ${IMAGE_TAG}"
            echo
            sanityctl run -f build-php-images-sanity.yaml --output text --summary markdown
          } | tee "$log"

          echo "log=$log" >> "$GITHUB_OUTPUT"

      - name: Trivy scan candidate (JSON)
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --cache-dir ~/.cache/trivy \
            --format json \
            --output trivy-results-pre.json \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            "local/${{ env.IMAGE_NAME }}:${{ matrix.php }}-${{ matrix.variant }}-candidate"

      - name: Detect Alpine versions
        id: alpine
        shell: bash
        run: |
          set -euo pipefail

          DOCKERFILE_ALPINE_FULL="$(
            awk '
              BEGIN { IGNORECASE=1 }
              /^FROM[[:space:]]+/ {
                if (match($0, /alpine:([0-9]+\.[0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine:([0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine([0-9]+\.[0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
                if (match($0, /alpine([0-9]+\.[0-9]+)/, m)) { print m[1]; exit }
              }
            ' "${{ matrix.dockerfile }}" || true
          )"
          DOCKERFILE_ALPINE_FULL="$(printf '%s' "$DOCKERFILE_ALPINE_FULL" | tr -d '\r\n')"

          DOCKERFILE_ALPINE_MINOR=""
          if [ -n "$DOCKERFILE_ALPINE_FULL" ]; then
            DOCKERFILE_ALPINE_MINOR="$(printf '%s' "$DOCKERFILE_ALPINE_FULL" | cut -d. -f1,2)"
          fi

          IMAGE_ALPINE_FULL="$(
            docker run --rm --entrypoint /bin/sh local/${{ env.IMAGE_NAME }}:${{ matrix.php }}-${{ matrix.variant }}-candidate \
              -lc 'cat /etc/alpine-release' || true
          )"
          IMAGE_ALPINE_FULL="$(printf '%s' "$IMAGE_ALPINE_FULL" | tr -d '\r\n')"

          IMAGE_ALPINE_MINOR=""
          if [ -n "$IMAGE_ALPINE_FULL" ]; then
            IMAGE_ALPINE_MINOR="$(printf '%s' "$IMAGE_ALPINE_FULL" | cut -d. -f1,2)"
          fi

          {
            printf 'dockerfile_full=%s\n' "$DOCKERFILE_ALPINE_FULL"
            printf 'dockerfile_minor=%s\n' "$DOCKERFILE_ALPINE_MINOR"
            printf 'image_full=%s\n' "$IMAGE_ALPINE_FULL"
            printf 'image_minor=%s\n' "$IMAGE_ALPINE_MINOR"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Alpine detection"
            echo "- Dockerfile full: \`${DOCKERFILE_ALPINE_FULL:-<empty>}\`"
            echo "- Dockerfile minor: \`${DOCKERFILE_ALPINE_MINOR:-<empty>}\`"
            echo "- Image full: \`${IMAGE_ALPINE_FULL:-<empty>}\`"
            echo "- Image minor: \`${IMAGE_ALPINE_MINOR:-<empty>}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Select matching hotfixes
        id: hotfixes
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .hotfixes-selected
          mkdir -p .hotfixes-selected
          : > .hotfixes-selected-files.txt

          mapfile -t CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          declare -a SEARCH_DIRS=()
          add_dir() {
            local dir="$1"
            [ -z "$dir" ] && return 0
            for existing in "${SEARCH_DIRS[@]:-}"; do
              [ "$existing" = "$dir" ] && return 0
            done
            SEARCH_DIRS+=("$dir")
          }

          add_dir "hotfixes/all"
          add_dir "hotfixes/alpine/all"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.dockerfile_full }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_minor }}"
          add_dir "hotfixes/alpine/${{ steps.alpine.outputs.image_full }}"
          add_dir "hotfixes/php/${{ matrix.php }}/all"
          add_dir "hotfixes/php/${{ matrix.php }}/${{ matrix.variant }}"

          declare -a MATCHED_CVES=()
          declare -a UNMATCHED_CVES=()
          declare -a SELECTED_FILES=()

          found=0
          idx=0

          for cve in "${CVES[@]}"; do
            matched_this_cve=0

            for dir in "${SEARCH_DIRS[@]}"; do
              [ -d "$dir" ] || continue
              shopt -s nullglob
              for f in "$dir/${cve}"-*.sh; do
                idx=$((idx + 1))
                dest=".hotfixes-selected/$(printf '%03d' "$idx")-$(basename "$f")"
                cp "$f" "$dest"
                SELECTED_FILES+=("$f")
                printf '%s\n' "$f" >> .hotfixes-selected-files.txt
                matched_this_cve=1
                found=1
              done
              shopt -u nullglob
            done

            if [ "$matched_this_cve" -eq 1 ]; then
              MATCHED_CVES+=("$cve")
            else
              UNMATCHED_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          if [ "$found" -eq 1 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matched_cves=$(joined "${MATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "unmatched_cves=$(joined "${UNMATCHED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "selected_count=${#SELECTED_FILES[@]}" >> "$GITHUB_OUTPUT"

          {
            echo "### Hotfix selection"
            echo "- PHP: \`${{ matrix.php }}\`"
            echo "- Variant: \`${{ matrix.variant }}\`"
            echo "- Search dirs:"
            for dir in "${SEARCH_DIRS[@]}"; do
              echo "  - \`$dir\`"
            done
            echo "- CVEs from pre-scan: \`${#CVES[@]}\`"
            echo "- CVEs matched by hotfix: \`${#MATCHED_CVES[@]}\`"
            echo "- CVEs without hotfix: \`${#UNMATCHED_CVES[@]}\`"
            echo "- Selected scripts: \`${#SELECTED_FILES[@]}\`"

            if [ "${#MATCHED_CVES[@]}" -gt 0 ]; then
              echo
              echo "**Matched CVEs**"
              for cve in "${MATCHED_CVES[@]}"; do
                echo "- \`$cve\`"
              done
            fi

            if [ "${#UNMATCHED_CVES[@]}" -gt 0 ]; then
              echo
              echo "**Unmatched CVEs**"
              for cve in "${UNMATCHED_CVES[@]}"; do
                echo "- \`$cve\`"
              done
            fi

            if [ "${#SELECTED_FILES[@]}" -gt 0 ]; then
              echo
              echo "**Selected hotfix scripts**"
              for f in "${SELECTED_FILES[@]}"; do
                echo "- \`$f\`"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Push final image without hotfixes
        if: steps.hotfixes.outputs.enabled != 'true'
        id: buildpush_plain
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: |
            ${{ steps.tags.outputs.TAG_MOVING }}
            ${{ steps.tags.outputs.TAG_DATE }}
            ${{ steps.tags.outputs.TAG_SHA }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ matrix.php }}-${{ matrix.variant }}
            type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.php }}-${{ matrix.variant }}
            type=registry,ref=${{ steps.cache.outputs.ref }},mode=max

      - name: Push final image with hotfixes
        if: steps.hotfixes.outputs.enabled == 'true'
        id: buildpush_hotfix
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          build-args: |
            PECL_FILE=${{ matrix.context }}/pecl.txt
          tags: |
            ${{ steps.tags.outputs.TAG_MOVING }}
            ${{ steps.tags.outputs.TAG_DATE }}
            ${{ steps.tags.outputs.TAG_SHA }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: false
          sbom: false
          cache-from: |
            type=gha,scope=${{ matrix.php }}-${{ matrix.variant }}
            type=registry,ref=${{ steps.cache.outputs.ref }}
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.php }}-${{ matrix.variant }}
            type=registry,ref=${{ steps.cache.outputs.ref }},mode=max

      - name: Resolve final digest
        id: finalimg
        shell: bash
        run: |
          set -euo pipefail

          DIGEST="${{ steps.buildpush_hotfix.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            DIGEST="${{ steps.buildpush_plain.outputs.digest }}"
          fi

          if [ -z "$DIGEST" ]; then
            echo "Final digest is empty." >&2
            exit 1
          fi

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Trivy scan final image (JSON)
        shell: bash
        run: |
          set -euo pipefail
          trivy image \
            --cache-dir ~/.cache/trivy \
            --format json \
            --output trivy-results.json \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            "${{ steps.tags.outputs.TAG_SHA }}"

      - name: Convert final Trivy JSON to SARIF
        shell: bash
        run: |
          set -euo pipefail
          trivy convert --format sarif --output trivy-results.sarif trivy-results.json

      - name: Convert final Trivy JSON to HTML
        shell: bash
        run: |
          set -euo pipefail
          trivy convert --format template --template "@.github/trivy/html-raport.tpl" --output trivy-report.html trivy-results.json

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Analyze remediation result
        id: remediation
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t PRE_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results-pre.json | sort -u
          )

          mapfile -t POST_CVES < <(
            jq -r '.Results[]?.Vulnerabilities[]?.VulnerabilityID // empty' trivy-results.json | sort -u
          )

          declare -A PRE_SET=()
          declare -A POST_SET=()

          for cve in "${PRE_CVES[@]}"; do
            PRE_SET["$cve"]=1
          done
          for cve in "${POST_CVES[@]}"; do
            POST_SET["$cve"]=1
          done

          declare -a FIXED_CVES=()
          declare -a REMAINING_CVES=()
          declare -a NEW_CVES=()

          for cve in "${PRE_CVES[@]}"; do
            if [ -n "${POST_SET[$cve]:-}" ]; then
              REMAINING_CVES+=("$cve")
            else
              FIXED_CVES+=("$cve")
            fi
          done

          for cve in "${POST_CVES[@]}"; do
            if [ -z "${PRE_SET[$cve]:-}" ]; then
              NEW_CVES+=("$cve")
            fi
          done

          joined() {
            local IFS=','
            echo "$*"
          }

          echo "fixed_cves=$(joined "${FIXED_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "remaining_cves=$(joined "${REMAINING_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "new_cves=$(joined "${NEW_CVES[@]}")" >> "$GITHUB_OUTPUT"
          echo "fixed_count=${#FIXED_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "remaining_count=${#REMAINING_CVES[@]}" >> "$GITHUB_OUTPUT"
          echo "new_count=${#NEW_CVES[@]}" >> "$GITHUB_OUTPUT"

          {
            echo "### Hotfix effectiveness"
            echo "- Fixed CVEs: \`${#FIXED_CVES[@]}\`"
            echo "- Remaining CVEs: \`${#REMAINING_CVES[@]}\`"
            echo "- New CVEs after rebuild: \`${#NEW_CVES[@]}\`"

            if [ "${#FIXED_CVES[@]}" -gt 0 ]; then
              echo
              echo "**Fixed after rebuild**"
              for cve in "${FIXED_CVES[@]}"; do
                echo "- \`$cve\`"
              done
            fi

            if [ "${#REMAINING_CVES[@]}" -gt 0 ]; then
              echo
              echo "**Still present after rebuild**"
              for cve in "${REMAINING_CVES[@]}"; do
                echo "- \`$cve\`"
              done
            fi

            if [ "${#NEW_CVES[@]}" -gt 0 ]; then
              echo
              echo "**New after rebuild**"
              for cve in "${NEW_CVES[@]}"; do
                echo "- \`$cve\`"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Append security summary
        shell: bash
        run: |
          set -euo pipefail

          pre_critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results-pre.json)"
          pre_high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results-pre.json)"
          pre_medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results-pre.json)"

          post_critical="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)"
          post_high="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)"
          post_medium="$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)"

          {
            echo "### Security summary"
            echo
            echo "| Stage | Critical | High | Medium |"
            echo "|---|---:|---:|---:|"
            echo "| Before hotfixes | ${pre_critical} | ${pre_high} | ${pre_medium} |"
            echo "| After hotfixes | ${post_critical} | ${post_high} | ${post_medium} |"
            echo
            echo "### Hotfix matching"
            echo
            echo "- Hotfix scripts selected: \`${{ steps.hotfixes.outputs.selected_count }}\`"
            echo "- Matching hotfix CVEs found: \`${{ steps.hotfixes.outputs.matched_cves || 'none' }}\`"
            echo "- Unmatched CVEs: \`${{ steps.hotfixes.outputs.unmatched_cves || 'none' }}\`"
            echo "- Hotfix rebuild performed: \`${{ steps.hotfixes.outputs.enabled }}\`"
            echo "- Fixed CVEs after rebuild: \`${{ steps.remediation.outputs.fixed_count }}\`"
            echo "- Remaining CVEs after rebuild: \`${{ steps.remediation.outputs.remaining_count }}\`"
            echo "- New CVEs after rebuild: \`${{ steps.remediation.outputs.new_count }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Print hotfix status
        shell: bash
        run: |
          echo "Hotfix enabled: ${{ steps.hotfixes.outputs.enabled }}"
          echo "Matched CVEs: ${{ steps.hotfixes.outputs.matched_cves }}"
          echo "Unmatched CVEs: ${{ steps.hotfixes.outputs.unmatched_cves }}"
          echo "Selected scripts count: ${{ steps.hotfixes.outputs.selected_count }}"
          echo "Fixed CVEs: ${{ steps.remediation.outputs.fixed_cves }}"
          echo "Remaining CVEs: ${{ steps.remediation.outputs.remaining_cves }}"
          echo "New CVEs: ${{ steps.remediation.outputs.new_cves }}"

      - name: Write image and scan artifacts
        shell: bash
        env:
          PHP_VERSION: ${{ matrix.php }}
          VARIANT: ${{ matrix.variant }}
          IMAGE_SHA: ${{ steps.tags.outputs.TAG_SHA }}
          IMAGE_DATE: ${{ steps.tags.outputs.TAG_DATE }}
          IMAGE_MOVING: ${{ steps.tags.outputs.TAG_MOVING }}
          DIGEST: ${{ steps.finalimg.outputs.digest }}
          HOTFIX_ENABLED: ${{ steps.hotfixes.outputs.enabled }}
          MATCHED_CVES: ${{ steps.hotfixes.outputs.matched_cves }}
          UNMATCHED_CVES: ${{ steps.hotfixes.outputs.unmatched_cves }}
          SELECTED_COUNT: ${{ steps.hotfixes.outputs.selected_count }}
          FIXED_CVES: ${{ steps.remediation.outputs.fixed_cves }}
          REMAINING_CVES: ${{ steps.remediation.outputs.remaining_cves }}
          NEW_CVES: ${{ steps.remediation.outputs.new_cves }}
          ALPINE_IMAGE_FULL: ${{ steps.alpine.outputs.image_full }}
          ALPINE_IMAGE_MINOR: ${{ steps.alpine.outputs.image_minor }}
          ALPINE_DOCKERFILE_FULL: ${{ steps.alpine.outputs.dockerfile_full }}
          ALPINE_DOCKERFILE_MINOR: ${{ steps.alpine.outputs.dockerfile_minor }}
        run: |
          set -euo pipefail

          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
          MED=$(jq  '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)

          mkdir -p out

          OS="${{ steps.alpine.outputs.image_full }}"
          if [ -z "$OS" ]; then
            OS="${{ steps.alpine.outputs.dockerfile_full }}"
          fi
          [ -z "$OS" ] && OS="unknown"

          META="out/image-meta-${{ matrix.php }}-${{ matrix.variant }}.txt"
          SUM="out/trivy-summary-${{ matrix.php }}-${{ matrix.variant }}.txt"

          cat > "$META" <<EOF
          php=${{ matrix.php }}
          variant=${{ matrix.variant }}
          os=${OS}
          image_sha=${{ steps.tags.outputs.TAG_SHA }}
          image_date=${{ steps.tags.outputs.TAG_DATE }}
          image_moving=${{ steps.tags.outputs.TAG_MOVING }}
          digest=${{ steps.finalimg.outputs.digest }}
          EOF

          cat > "$SUM" <<EOF
          php=${{ matrix.php }}
          variant=${{ matrix.variant }}
          image_sha=${{ steps.tags.outputs.TAG_SHA }}
          digest=${{ steps.finalimg.outputs.digest }}
          critical=${CRIT}
          high=${HIGH}
          medium=${MED}
          EOF

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          
          def csv_list(value: str) -> list[str]:
              return [item for item in (value or "").split(",") if item]
          
          php = os.environ["PHP_VERSION"]
          variant = os.environ["VARIANT"]
          image_sha = os.environ["IMAGE_SHA"]
          image_date = os.environ["IMAGE_DATE"]
          image_moving = os.environ["IMAGE_MOVING"]
          digest = os.environ["DIGEST"]
          hotfix_enabled = (os.environ.get("HOTFIX_ENABLED", "").lower() == "true")
          selected_count = int(os.environ.get("SELECTED_COUNT") or "0")
          matched_cves = csv_list(os.environ.get("MATCHED_CVES", ""))
          unmatched_cves = csv_list(os.environ.get("UNMATCHED_CVES", ""))
          fixed_cves = csv_list(os.environ.get("FIXED_CVES", ""))
          remaining_cves = csv_list(os.environ.get("REMAINING_CVES", ""))
          new_cves = csv_list(os.environ.get("NEW_CVES", ""))
          alpine_full = os.environ.get("ALPINE_IMAGE_FULL") or os.environ.get("ALPINE_DOCKERFILE_FULL") or "unknown"
          alpine_minor = os.environ.get("ALPINE_IMAGE_MINOR") or os.environ.get("ALPINE_DOCKERFILE_MINOR") or "unknown"
          
          selected_scripts_path = Path(".hotfixes-selected-files.txt")
          selected_scripts = []
          if selected_scripts_path.exists():
              selected_scripts = [line.strip() for line in selected_scripts_path.read_text(encoding="utf-8").splitlines() if line.strip()]
          
          hotfix_meta = {
              "php": php,
              "variant": variant,
              "alpine_minor": alpine_minor,
              "alpine_full": alpine_full,
              "image_sha": image_sha,
              "image_date": image_date,
              "image_moving": image_moving,
              "digest": digest,
              "hotfix_enabled": hotfix_enabled,
              "selected_count": selected_count,
              "matched_cves": matched_cves,
              "unmatched_cves": unmatched_cves,
              "fixed_cves": fixed_cves,
              "remaining_cves": remaining_cves,
              "new_cves": new_cves,
              "selected_scripts": selected_scripts,
          }
          
          Path(f"out/hotfix-meta-{php}-{variant}.json").write_text(
              json.dumps(hotfix_meta, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          
          def is_php_specific_package(pkg: str) -> bool:
              pkg = (pkg or "").strip().lower()
              if not pkg:
                  return False
              if pkg == "php":
                  return True
              if pkg.startswith("php"):
                  return True
              return False
          
          trivy = json.loads(Path("trivy-results.json").read_text(encoding="utf-8"))
          records = []
          
          for result in trivy.get("Results") or []:
              for vuln in result.get("Vulnerabilities") or []:
                  package = vuln.get("PkgName") or ""
                  records.append(
                      {
                          "scope": "php" if is_php_specific_package(package) else "os",
                          "php": php,
                          "variant": variant,
                          "alpine_minor": alpine_minor,
                          "alpine_full": alpine_full,
                          "image_sha": image_sha,
                          "image_date": image_date,
                          "image_moving": image_moving,
                          "digest": digest,
                          "package": package,
                          "installed_version": vuln.get("InstalledVersion") or "",
                          "fixed_version": vuln.get("FixedVersion") or "",
                          "severity": vuln.get("Severity") or "UNKNOWN",
                          "cve": vuln.get("VulnerabilityID") or "",
                          "title": vuln.get("Title") or "",
                          "primary_url": vuln.get("PrimaryURL") or "",
                      }
                  )
          
          Path(f"out/vulns-{php}-{variant}.json").write_text(
              json.dumps(records, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          if [ -f trivy-report.html ]; then
            cp trivy-report.html "out/trivy-${{ matrix.php }}-${{ matrix.variant }}.html"
          fi

      - uses: actions/upload-artifact@v7
        if: steps.phpctl_check.outputs.log != '' && hashFiles(steps.phpctl_check.outputs.log) != ''
        with:
          name: phpctl-check-${{ matrix.php }}-${{ matrix.variant }}
          path: ${{ steps.phpctl_check.outputs.log }}
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: hashFiles(format('out/image-meta-{0}-{1}.txt', matrix.php, matrix.variant)) != ''
        with:
          name: image-meta-${{ matrix.php }}-${{ matrix.variant }}
          path: out/image-meta-${{ matrix.php }}-${{ matrix.variant }}.txt
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: hashFiles(format('out/trivy-summary-{0}-{1}.txt', matrix.php, matrix.variant)) != ''
        with:
          name: trivy-summary-${{ matrix.php }}-${{ matrix.variant }}
          path: out/trivy-summary-${{ matrix.php }}-${{ matrix.variant }}.txt
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: hashFiles(format('out/trivy-{0}-{1}.html', matrix.php, matrix.variant)) != ''
        with:
          name: trivy-report-${{ matrix.php }}-${{ matrix.variant }}
          path: out/trivy-${{ matrix.php }}-${{ matrix.variant }}.html
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: hashFiles(format('out/hotfix-meta-{0}-{1}.json', matrix.php, matrix.variant)) != ''
        with:
          name: hotfix-meta-${{ matrix.php }}-${{ matrix.variant }}
          path: out/hotfix-meta-${{ matrix.php }}-${{ matrix.variant }}.json
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        if: hashFiles(format('out/vulns-{0}-{1}.json', matrix.php, matrix.variant)) != ''
        with:
          name: vulns-${{ matrix.php }}-${{ matrix.variant }}
          path: out/vulns-${{ matrix.php }}-${{ matrix.variant }}.json
          if-no-files-found: error

  sync-security-issues:
    name: sync security issues
    needs: [discover, build]
    if: github.ref == 'refs/heads/main' && always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Validate upstream jobs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.discover.outputs.count }}" != "0" ] && [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build job did not complete successfully." >&2
            exit 1
          fi

      - name: Download vulnerability artifacts
        if: needs.discover.outputs.count != '0'
        uses: actions/download-artifact@v8
        with:
          pattern: vulns-*
          path: artifacts/vulns
          merge-multiple: true

      - name: Download hotfix metadata artifacts
        if: needs.discover.outputs.count != '0'
        uses: actions/download-artifact@v8
        with:
          pattern: hotfix-meta-*
          path: artifacts/hotfix-meta
          merge-multiple: true

      - name: Build aggregated vulnerability groups
        if: needs.discover.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path
          import os
          
          severity_rank = {
              "UNKNOWN": 0,
              "LOW": 1,
              "MEDIUM": 2,
              "HIGH": 3,
              "CRITICAL": 4,
          }
          
          hotfix_by_variant = {}
          for path in sorted(Path("artifacts/hotfix-meta").glob("*.json")):
              obj = json.loads(path.read_text(encoding="utf-8"))
              hotfix_by_variant[(obj.get("php", ""), obj.get("variant", ""))] = obj
          
          groups = {}
          
          for path in sorted(Path("artifacts/vulns").glob("*.json")):
              items = json.loads(path.read_text(encoding="utf-8"))
              for item in items:
                  scope = item.get("scope") or "os"
                  cve = item.get("cve") or ""
                  php = item.get("php") or ""
                  alpine_minor = item.get("alpine_minor") or "unknown"
                  if not cve:
                      continue
          
                  if scope == "php":
                      key = f"php|{php}|{alpine_minor}|{cve}"
                  else:
                      key = f"os|{alpine_minor}|{cve}"
          
                  group = groups.setdefault(
                      key,
                      {
                          "scope": scope,
                          "php": php if scope == "php" else "",
                          "alpine_minor": alpine_minor,
                          "cve": cve,
                          "severity": "UNKNOWN",
                          "alpine_full_versions": set(),
                          "php_branches": set(),
                          "variants": set(),
                          "package_rows": set(),
                          "primary_urls": set(),
                          "images": [],
                          "matched_hotfix_scripts": set(),
                      },
                  )
          
                  current_severity = item.get("severity") or "UNKNOWN"
                  if severity_rank.get(current_severity, 0) > severity_rank.get(group["severity"], 0):
                      group["severity"] = current_severity
          
                  if item.get("alpine_full"):
                      group["alpine_full_versions"].add(item["alpine_full"])
                  if php:
                      group["php_branches"].add(php)
                  if item.get("variant"):
                      group["variants"].add(item["variant"])
          
                  group["package_rows"].add(
                      (
                          item.get("package") or "",
                          item.get("installed_version") or "",
                          item.get("fixed_version") or "",
                      )
                  )
          
                  if item.get("primary_url"):
                      group["primary_urls"].add(item["primary_url"])
          
                  group["images"].append(
                      {
                          "php": php,
                          "variant": item.get("variant") or "unknown",
                          "image_sha": item.get("image_sha") or "",
                          "digest": item.get("digest") or "",
                      }
                  )
          
                  variant_key = (php, item.get("variant") or "")
                  hotfix_meta = hotfix_by_variant.get(variant_key, {})
                  for script in hotfix_meta.get("selected_scripts") or []:
                      name = os.path.basename(script)
                      if name.startswith(f"{cve}-"):
                          group["matched_hotfix_scripts"].add(script)
          
          normalized = []
          for group in groups.values():
              images = []
              seen_images = set()
              for image in sorted(group["images"], key=lambda x: (x["php"], x["variant"], x["image_sha"], x["digest"])):
                  key = (image["php"], image["variant"], image["image_sha"], image["digest"])
                  if key in seen_images:
                      continue
                  seen_images.add(key)
                  images.append(image)
          
              normalized.append(
                  {
                      "scope": group["scope"],
                      "php": group["php"],
                      "alpine_minor": group["alpine_minor"],
                      "cve": group["cve"],
                      "severity": group["severity"],
                      "alpine_full_versions": sorted(group["alpine_full_versions"]),
                      "php_branches": sorted(group["php_branches"]),
                      "variants": sorted(group["variants"]),
                      "package_rows": [
                          {
                              "package": pkg,
                              "installed_version": installed,
                              "fixed_version": fixed,
                          }
                          for pkg, installed, fixed in sorted(group["package_rows"])
                      ],
                      "primary_urls": sorted(group["primary_urls"]),
                      "images": images,
                      "matched_hotfix_scripts": sorted(group["matched_hotfix_scripts"]),
                      "matched_hotfix_scripts_count": len(group["matched_hotfix_scripts"]),
                  }
              )
          
          Path("aggregated-vulns.json").write_text(
              json.dumps(
                  sorted(
                      normalized,
                      key=lambda x: (
                          x["scope"],
                          x.get("php") or "",
                          x["alpine_minor"],
                          x["cve"],
                      ),
                  ),
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create, update, and close security issues
        if: needs.discover.outputs.count != '0'
        uses: actions/github-script@v8
        env:
          FULL_BUILD: ${{ needs.discover.outputs.full }}
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const fullBuild = String(process.env.FULL_BUILD || "").toLowerCase() === "true";
            const groups = JSON.parse(fs.readFileSync("aggregated-vulns.json", "utf8"));

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            };

            const parseMarkerList = (text, key) => {
              const re = new RegExp(`<!-- ${key}:([^>]*) -->`);
              const match = (text || "").match(re);
              if (!match) {
                return [];
              }
              return match[1]
                .split(",")
                .map(v => v.trim())
                .filter(Boolean)
                .sort();
            };

            const parseMarkerValue = (text, key) => {
              const re = new RegExp(`<!-- ${key}:([^>]*) -->`);
              const match = (text || "").match(re);
              return match ? match[1].trim() : "";
            };

            const toBulletList = values =>
              values.length ? values.map(v => `- \`${v}\``).join("\n") : "- none";

            const toIndentedBulletList = values =>
              values.length ? values.map(v => `  - \`${v}\``).join("\n") : "  - none";

            const uniq = values => [...new Set(values)].sort();

            const diff = (previous, current) => ({
              added: current.filter(v => !previous.includes(v)),
              removed: previous.filter(v => !current.includes(v)),
            });

            await ensureLabel("security", "b60205", "Security issue");
            await ensureLabel("trivy", "5319e7", "Detected by Trivy");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const managedOpenIssues = openIssues.filter(issue =>
              (issue.body || "").includes("<!-- managed-by: trivy-cve-sync -->")
            );

            const currentKeys = new Set();

            for (const group of groups) {
              const alpineLabel = `alpine-${group.alpine_minor}`;
              const cveLabel = `cve:${group.cve}`;
              const phpBranches = uniq(group.php_branches || []);
              const variants = uniq(group.variants || []);
              const packageRows = group.package_rows || [];
              const matchedHotfixScripts = uniq(group.matched_hotfix_scripts || []);
              const references = uniq(group.primary_urls || []);
              const alpineFull = uniq(group.alpine_full_versions || []);

              await ensureLabel(alpineLabel, "1d76db", `Alpine ${group.alpine_minor}`);
              await ensureLabel(cveLabel, "d93f0b", `CVE ${group.cve}`);

              let title;
              let labels;
              let key;

              if (group.scope === "php") {
                const phpLabel = `php-${group.php}`;
                await ensureLabel(phpLabel, "0e8a16", `PHP branch ${group.php}`);
                title = `Security: ${group.cve} affects PHP ${group.php} images`;
                labels = ["security", "trivy", phpLabel, alpineLabel, cveLabel];
                key = `php|php-${group.php}|alpine-${group.alpine_minor}|${group.cve}`;
              } else {
                title = `Security: ${group.cve} affects images based on Alpine ${group.alpine_minor}`;
                labels = ["security", "trivy", alpineLabel, cveLabel];
                key = `os|alpine-${group.alpine_minor}|${group.cve}`;
              }

              currentKeys.add(key);

              const imagesBlock = group.images.length
                ? group.images
                    .map(img => {
                      const digestPart = img.digest ? `@${img.digest}` : "";
                      const phpPart = img.php ? `${img.php} / ` : "";
                      return `- \`${img.image_sha}${digestPart}\` (${phpPart}${img.variant})`;
                    })
                    .join("\n")
                : "- none";

              const referencesBlock = references.length
                ? references.map(url => `- ${url}`).join("\n")
                : "- none";

              const packageTable = packageRows.length
                ? [
                    `| Package | Installed version | Fixed version |`,
                    `|---|---|---|`,
                    ...packageRows.map(row =>
                      `| \`${row.package || "unknown"}\` | \`${row.installed_version || "unknown"}\` | \`${row.fixed_version || "unknown"}\` |`
                    ),
                  ].join("\n")
                : "- none";

              const packageNames = uniq(packageRows.map(row => row.package).filter(Boolean));

              const body = [
                `Automated Trivy scan detected an unresolved vulnerability.`,
                ``,
                `## Summary`,
                `- CVE: \`${group.cve}\``,
                `- Severity: \`${group.severity}\``,
                ...(group.scope === "php" ? [`- PHP branch: \`${group.php}\``] : []),
                `- Alpine branch: \`${group.alpine_minor}\``,
                `- Alpine version detected in affected images: \`${alpineFull.length ? alpineFull.join(", ") : "unknown"}\``,
                ``,
                ...(group.scope === "os"
                  ? [
                      `## Affected PHP branches`,
                      toBulletList(phpBranches),
                      ``,
                    ]
                  : []),
                `## Affected variants`,
                toBulletList(variants),
                ``,
                `## Affected packages`,
                packageTable,
                ``,
                `## Affected images`,
                imagesBlock,
                ``,
                `## Remediation status`,
                `- Matched hotfix scripts: \`${matchedHotfixScripts.length}\``,
                `- CVE present after rebuild: \`yes\``,
                ...(group.scope === "os"
                  ? [
                      `- Affected PHP branches after rebuild:`,
                      toIndentedBulletList(phpBranches),
                    ]
                  : []),
                `- Affected variants after rebuild:`,
                toIndentedBulletList(variants),
                ``,
                `## Workflow context`,
                `- Workflow: ${context.workflow}`,
                `- Run ID: ${context.runId}`,
                `- Commit: \`${context.sha}\``,
                ``,
                `## References`,
                referencesBlock,
                ``,
                `<!-- managed-by: trivy-cve-sync -->`,
                `<!-- scope:${group.scope} -->`,
                `<!-- cve-key:${key} -->`,
                `<!-- php-branches:${phpBranches.join(",")} -->`,
                `<!-- variants:${variants.join(",")} -->`,
                `<!-- packages:${packageNames.join(",")} -->`,
                `<!-- matched-hotfix-scripts:${matchedHotfixScripts.length} -->`,
              ].join("\n");

              const existing = managedOpenIssues.find(issue => parseMarkerValue(issue.body, "cve-key") === key);

              if (!existing) {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels,
                });
                continue;
              }

              const previousVariants = parseMarkerList(existing.body, "variants");
              const previousPhpBranches = parseMarkerList(existing.body, "php-branches");
              const variantDiff = diff(previousVariants, variants);
              const phpBranchDiff = diff(previousPhpBranches, phpBranches);

              if (
                variantDiff.added.length ||
                variantDiff.removed.length ||
                (group.scope === "os" && (phpBranchDiff.added.length || phpBranchDiff.removed.length))
              ) {
                const commentLines = [
                  `Update after latest automated Trivy scan.`,
                  ``,
                  `The scope of this vulnerability changed.`,
                  ``,
                ];

                if (group.scope === "os" && phpBranchDiff.added.length) {
                  commentLines.push(`Added PHP branches:`);
                  commentLines.push(toBulletList(phpBranchDiff.added));
                  commentLines.push(``);
                }

                if (group.scope === "os" && phpBranchDiff.removed.length) {
                  commentLines.push(`Removed PHP branches:`);
                  commentLines.push(toBulletList(phpBranchDiff.removed));
                  commentLines.push(``);
                }

                if (variantDiff.added.length) {
                  commentLines.push(`Added variants:`);
                  commentLines.push(toBulletList(variantDiff.added));
                  commentLines.push(``);
                }

                if (variantDiff.removed.length) {
                  commentLines.push(`Removed variants:`);
                  commentLines.push(toBulletList(variantDiff.removed));
                  commentLines.push(``);
                }

                if (group.scope === "os") {
                  commentLines.push(`Currently affected PHP branches:`);
                  commentLines.push(toBulletList(phpBranches));
                  commentLines.push(``);
                }

                commentLines.push(`Currently affected:`);
                commentLines.push(toBulletList(variants));
                commentLines.push(``);
                commentLines.push(`Workflow run: ${context.runId}`);
                commentLines.push(`Commit: \`${context.sha}\``);

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: commentLines.join("\n"),
                });
              }

              const existingLabels = (existing.labels || []).map(label =>
                typeof label === "string" ? label : label.name
              );
              const labelsChanged =
                labels.length !== existingLabels.length ||
                labels.some(label => !existingLabels.includes(label));

              if (existing.title !== title || existing.body !== body || labelsChanged) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  title,
                  body,
                  labels,
                });
              }
            }

            if (!fullBuild) {
              return;
            }

            for (const issue of managedOpenIssues) {
              const key = parseMarkerValue(issue.body, "cve-key");
              if (!key || currentKeys.has(key)) {
                continue;
              }

              const scope = parseMarkerValue(issue.body, "scope");
              const parts = key.split("|");

              let closeMessage = "Latest automated Trivy scan no longer detects this CVE. Closing issue.";

              if (scope === "php" && parts.length >= 4) {
                const php = parts[1].replace(/^php-/, "");
                closeMessage = `Latest automated Trivy scan no longer detects this CVE for PHP ${php} images. Closing issue.`;
              } else if (scope === "os" && parts.length >= 3) {
                const alpine = parts[1].replace(/^alpine-/, "");
                closeMessage = `Latest automated Trivy scan no longer detects this CVE for images based on Alpine ${alpine}. Closing issue.`;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: closeMessage,
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
              });
            }

  update-repo:
    name: update releases and generated repository content
    needs: [discover, build, sync-security-issues]
    if: github.ref == 'refs/heads/main' && always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate upstream jobs
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SITE_BASE_URL}" ]; then
            echo "Repository variable SITE_BASE_URL is required." >&2
            exit 1
          fi

          if [ "${{ needs.discover.outputs.count }}" != "0" ] && [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build job did not complete successfully." >&2
            exit 1
          fi

          if [ "${{ needs.discover.outputs.count }}" != "0" ] && [ "${{ needs.sync-security-issues.result }}" != "success" ]; then
            echo "Security issue sync job did not complete successfully." >&2
            exit 1
          fi

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download image metadata artifacts
        if: needs.discover.outputs.count != '0'
        uses: actions/download-artifact@v8
        with:
          pattern: image-meta-*
          path: artifacts/image-meta
          merge-multiple: true

      - name: Download Trivy summary artifacts
        if: needs.discover.outputs.count != '0'
        uses: actions/download-artifact@v8
        with:
          pattern: trivy-summary-*
          path: artifacts/trivy
          merge-multiple: true

      - name: Download Trivy HTML report artifacts
        if: needs.discover.outputs.count != '0'
        uses: actions/download-artifact@v8
        with:
          pattern: trivy-report-*
          path: artifacts/trivy-html
          merge-multiple: true

      - name: Fetch PHP lifecycle data for releases
        if: needs.discover.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/fetch-php-eol.py

      - name: Create or update releases
        if: needs.discover.outputs.count != '0' && (github.event.inputs.publish_target == '' || github.event.inputs.publish_target == 'ghcr')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          PHPS_JSON='${{ needs.discover.outputs.phps }}'
          if [ -z "$PHPS_JSON" ] || [ "$PHPS_JSON" = "null" ]; then
            echo "No PHP versions to release."
            exit 0
          fi

          mapfile -t PHPS < <(printf '%s' "$PHPS_JSON" | jq -r '.[]' | sort -V)
          if [ "${#PHPS[@]}" -eq 0 ]; then
            echo "No PHP versions to release."
            exit 0
          fi

          find_image_meta() {
            local php="$1" variant="$2"
            local file
            for file in artifacts/image-meta/*.txt; do
              [ -e "$file" ] || continue
              if grep -q "^php=${php}$" "$file" && grep -q "^variant=${variant}$" "$file"; then
                echo "$file"
                return 0
              fi
            done
            return 1
          }

          find_trivy_sum() {
            local php="$1" variant="$2"
            local file
            for file in artifacts/trivy/*.txt; do
              [ -e "$file" ] || continue
              if grep -q "^php=${php}$" "$file" && grep -q "^variant=${variant}$" "$file"; then
                echo "$file"
                return 0
              fi
            done
            return 1
          }

          php_lifecycle_field() {
            local php="$1" field="$2"
            python3 - "$php" "$field" <<'PY'
          import json
          import sys
          from pathlib import Path
          
          php = sys.argv[1]
          field = sys.argv[2]
          path = Path("web/_data/php-eol.json")
          
          if not path.exists():
              print("")
              raise SystemExit(0)
          
          obj = json.loads(path.read_text(encoding="utf-8"))
          info = obj.get(php, {})
          value = info.get(field, "")
          print(value if value is not None else "")
          PY
          }
            
          urlencode() {
            python3 - "$1" <<'PY'
          import sys
          from urllib.parse import quote
          print(quote(sys.argv[1], safe=""))
          PY
          }

          shields_endpoint() {
            local url="$1"
            local v="${GITHUB_RUN_ID:-$(date -u +%s)}"
            url="${url//:/%3A}"
            url="${url//\//%2F}"
            url="${url//\?/%3F}"
            url="${url//&/%26}"
            echo "https://img.shields.io/endpoint?url=${url}&cacheSeconds=300&v=${v}"
          }

          shields_static() {
            local label message color v
            label="$(urlencode "$1")"
            message="$(urlencode "$2")"
            color="$(urlencode "$3")"
            v="${GITHUB_RUN_ID:-$(date -u +%s)}"
            echo "https://img.shields.io/static/v1?label=${label}&message=${message}&color=${color}&v=${v}"
          }

          alpine_badge_md() {
            local version="$1"
            if [ -z "$version" ] || [ "$version" = "unknown" ]; then
              echo "![alpine]($(shields_static "alpine" "unknown" "lightgrey"))"
              return 0
            fi

            local badge link
            badge="$(shields_static "alpine" "v${version}" "blue")"
            link="https://hub.docker.com/layers/library/alpine/${version}"
            echo "[![alpine](${badge})](${link})"
          }

          for PHP in "${PHPS[@]}"; do
            if [ ! -d "versions/${PHP}" ]; then
              echo "versions/${PHP} not found, skipping release."
              continue
            fi

            mapfile -t VARIANTS < <(find "versions/${PHP}" -mindepth 2 -maxdepth 2 -type f -name Dockerfile -printf '%h\n' | awk -F/ '{print $3}' | sort -u)
            if [ "${#VARIANTS[@]}" -eq 0 ]; then
              echo "No variants found for PHP ${PHP}, skipping."
              continue
            fi

            for V in "${VARIANTS[@]}"; do
              if ! find_image_meta "$PHP" "$V" >/dev/null; then
                echo "Missing image metadata for ${PHP}/${V}." >&2
                exit 1
              fi
              if ! find_trivy_sum "$PHP" "$V" >/dev/null; then
                echo "Missing Trivy summary for ${PHP}/${V}." >&2
                exit 1
              fi
              if [ ! -f "artifacts/trivy-html/trivy-${PHP}-${V}.html" ]; then
                echo "Missing Trivy HTML report for ${PHP}/${V}." >&2
                exit 1
              fi
            done

            TAG="php-${PHP}"
            NOTES="release-notes-${PHP}.md"

            BUILT_UTC="$(date -u +%Y-%m-%d_%H:%M_UTC)"
            PHP_VERSION_FULL="$(php_lifecycle_field "$PHP" version)"
            PHP_EOL_DATE="$(php_lifecycle_field "$PHP" eol)"
            [ -z "$PHP_VERSION_FULL" ] && PHP_VERSION_FULL="$PHP"
            [ -z "$PHP_EOL_DATE" ] && PHP_EOL_DATE="unknown"
            PHP_BADGE="$(shields_static "php" "v${PHP}" "blue")"
            EOL_BADGE="$(shields_static "eol" "${PHP_EOL_DATE}" "blue")"
            BUILT_BADGE="$(shields_static "built" "${BUILT_UTC}" "blue")"
            TRIVY_TOTAL_BADGE="$(shields_endpoint "${SITE_BASE_URL}/badges/trivy-total.json")"

            OS_VER=""
            if find_image_meta "$PHP" "cli" >/dev/null 2>&1; then
              META_OS_FILE="$(find_image_meta "$PHP" "cli")"
              OS_VER="$(grep '^os=' "$META_OS_FILE" | cut -d= -f2 || true)"
            fi
            if [ -z "$OS_VER" ]; then
              META_OS_FILE="$(find_image_meta "$PHP" "${VARIANTS[0]}")"
              OS_VER="$(grep '^os=' "$META_OS_FILE" | cut -d= -f2 || true)"
            fi
            ALPINE_BADGE_MD="$(alpine_badge_md "$OS_VER")"

            {
              echo "## PHP ${PHP} images"
              echo
              echo "![php](${PHP_BADGE})"
              echo "![eol](${EOL_BADGE})"
              echo "![built](${BUILT_BADGE})"
              echo "${ALPINE_BADGE_MD}"
              echo "![trivy-total](${TRIVY_TOTAL_BADGE})"
              echo

              for V in "${VARIANTS[@]}"; do
                TRIVY_BADGE="$(shields_endpoint "${SITE_BASE_URL}/badges/trivy-${PHP}-${V}.json")"
                echo "**${V}**: ![trivy](${TRIVY_BADGE})"
              done
              echo

              echo "### Pull"
              echo
              echo "| Variant | Moving | Date | SHA | Digest |"
              echo "|---|---|---|---|---|"
              for V in "${VARIANTS[@]}"; do
                FILE="$(find_image_meta "$PHP" "$V")"
                SHA=$(grep '^image_sha=' "$FILE" | cut -d= -f2)
                DATE=$(grep '^image_date=' "$FILE" | cut -d= -f2)
                MOV=$(grep '^image_moving=' "$FILE" | cut -d= -f2)
                DIG=$(grep '^digest=' "$FILE" | cut -d= -f2)
                echo "| \`${V}\` | \`${MOV}\` | \`${DATE}\` | \`${SHA}\` | \`${DIG}\` |"
              done

              echo
              echo "### Trivy (ignore-unfixed; CRITICAL/HIGH/MEDIUM)"
              echo
              echo "| Variant | Image (sha@digest) | CRITICAL | HIGH | MEDIUM | Report |"
              echo "|---|---|---:|---:|---:|---|"
              for V in "${VARIANTS[@]}"; do
                FILE="$(find_trivy_sum "$PHP" "$V")"
                IMG=$(grep '^image_sha=' "$FILE" | cut -d= -f2)
                DIG=$(grep '^digest=' "$FILE" | cut -d= -f2)
                C=$(grep '^critical=' "$FILE" | cut -d= -f2)
                H=$(grep '^high=' "$FILE" | cut -d= -f2)
                M=$(grep '^medium=' "$FILE" | cut -d= -f2)
                R="${SITE_BASE_URL}/reports/trivy-${PHP}-${V}.html"
                echo "| \`${V}\` | \`${IMG}@${DIG}\` | $C | $H | $M | ${R} |"
              done
            } > "$NOTES"

            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release edit "$TAG" \
                --title "${PHP}" \
                --notes-file "$NOTES"
            else
              gh release create "$TAG" \
                --title "${PHP}" \
                --notes-file "$NOTES"
            fi
          done

      - name: Update generated badge and report files
        if: needs.discover.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p web/badges web/reports

          for PHP_DIR in versions/*; do
            [ -d "$PHP_DIR" ] || continue
            PHP="$(basename "$PHP_DIR")"

            META_FILE=""
            for file in artifacts/image-meta/*.txt; do
              [ -e "$file" ] || continue
              if grep -q "^php=${PHP}$" "$file" && grep -q "^variant=cli$" "$file"; then
                META_FILE="$file"
                break
              fi
            done
            if [ -z "$META_FILE" ]; then
              for file in artifacts/image-meta/*.txt; do
                [ -e "$file" ] || continue
                if grep -q "^php=${PHP}$" "$file"; then
                  META_FILE="$file"
                  break
                fi
              done
            fi

            if [ -z "$META_FILE" ]; then
              continue
            fi

            DATE="$(grep '^image_date=' "$META_FILE" | cut -d= -f2 || true)"
            SHA_TAG="$(grep '^image_sha=' "$META_FILE" | cut -d= -f2 || true)"
            SHA7="$(printf '%s' "$SHA_TAG" | sed -n 's/.*-sha-\([0-9a-f]\{7\}\).*/\1/p')"

            [ -z "$DATE" ] && DATE="unknown"
            [ -z "$SHA7" ] && SHA7="unknown"

            cat > "web/badges/last-${PHP}.json" <<EOF
            {"php":"${PHP}","date":"${DATE}","sha":"${SHA7}"}
            EOF
          done

          TOTAL_C=0
          TOTAL_H=0
          TOTAL_M=0

          for file in artifacts/trivy/*.txt; do
            [ -e "$file" ] || continue

            PHP=$(grep '^php=' "$file" | cut -d= -f2)
            VAR=$(grep '^variant=' "$file" | cut -d= -f2)
            C=$(grep '^critical=' "$file" | cut -d= -f2)
            H=$(grep '^high=' "$file" | cut -d= -f2)
            M=$(grep '^medium=' "$file" | cut -d= -f2)

            C=${C:-0}
            H=${H:-0}
            M=${M:-0}

            TOTAL_C=$((TOTAL_C + C))
            TOTAL_H=$((TOTAL_H + H))
            TOTAL_M=$((TOTAL_M + M))

            COLOR="brightgreen"
            if [ "$C" -gt 0 ]; then
              COLOR="red"
            elif [ "$H" -gt 0 ]; then
              COLOR="orange"
            elif [ "$M" -gt 0 ]; then
              COLOR="yellow"
            fi

            cat > "web/badges/trivy-${PHP}-${VAR}.json" <<EOF
            {"schemaVersion":1,"label":"trivy","message":"C:${C} H:${H} M:${M}","color":"${COLOR}"}
            EOF

            cat > "web/badges/trivy-${PHP}-${VAR}.data.json" <<EOF
            {"php":"${PHP}","variant":"${VAR}","critical":${C},"high":${H},"medium":${M}}
            EOF

            if [ -f "artifacts/trivy-html/trivy-${PHP}-${VAR}.html" ]; then
              cp "artifacts/trivy-html/trivy-${PHP}-${VAR}.html" "web/reports/trivy-${PHP}-${VAR}.html"
            fi
          done

          TOTAL_COLOR="brightgreen"
          if [ "$TOTAL_C" -gt 0 ]; then
            TOTAL_COLOR="red"
          elif [ "$TOTAL_H" -gt 0 ]; then
            TOTAL_COLOR="orange"
          elif [ "$TOTAL_M" -gt 0 ]; then
            TOTAL_COLOR="yellow"
          fi

          cat > web/badges/trivy-total.json <<EOF
          {"schemaVersion":1,"label":"trivy","message":"C:${TOTAL_C} H:${TOTAL_H} M:${TOTAL_M}","color":"${TOTAL_COLOR}"}
          EOF

          cat > web/badges/trivy-total.data.json <<EOF
          {"critical":${TOTAL_C},"high":${TOTAL_H},"medium":${TOTAL_M}}
          EOF

          PHP_VERSIONS=$(ls -1 versions 2>/dev/null | sort -V | paste -sd '|' -)
          [ -z "$PHP_VERSIONS" ] && PHP_VERSIONS="unknown"
          cat > web/badges/php.json <<EOF
          {"schemaVersion":1,"label":"php","message":"${PHP_VERSIONS}","color":"blue"}
          EOF

          BUILT="$(date -u +%Y-%m-%d_%H:%M_UTC)"
          cat > web/badges/built.json <<EOF
          {"schemaVersion":1,"label":"built","message":"${BUILT}","color":"blue"}
          EOF

          IMAGES_COUNT=$(find web/badges -maxdepth 1 -type f -name 'trivy-*.json' ! -name 'trivy-total.json' ! -name '*.data.json' | wc -l | tr -d ' ')
          cat > web/badges/images.json <<EOF
          {"schemaVersion":1,"label":"images","message":"${IMAGES_COUNT}","color":"blue"}
          EOF

      - name: Generate README
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/gen-readme.py

      - name: Generate web catalog data
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 scripts/gen-web-catalog.py

      - name: Commit generated content if changed
        shell: bash
        run: |
          set -euo pipefail

          git add README.md web/badges web/reports web/_data

          if git diff --cached --quiet; then
            echo "No generated file changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(repo): refresh generated assets"

          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push failed (attempt ${attempt}), retrying..."
            sleep 2
          done

          echo "Failed to push generated changes after retries." >&2
          exit 1

  pages-build:
    name: build site for GitHub Pages
    needs: update-repo
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'pages')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync to latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout --force main
          git reset --hard origin/main

      - name: Write dynamic Jekyll config
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SITE_BASE_URL}" ]; then
            echo "Repository variable SITE_BASE_URL is required." >&2
            exit 1
          fi

          cat > web/_config.dynamic.yml <<EOF
          url: "${SITE_BASE_URL}"
          EOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
          working-directory: web

      - name: Build site
        working-directory: web
        shell: bash
        run: |
          set -euo pipefail
          bundle exec jekyll build --config _config.yml,_config.dynamic.yml -d ../_site_web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site_web

  deploy-pages:
    name: deploy GitHub Pages
    needs: pages-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'pages')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-rsync:
    name: deploy site via rsync
    needs: update-repo
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'rsync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync to latest main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout --force main
          git reset --hard origin/main

      - name: Write dynamic Jekyll config
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SITE_BASE_URL}" ]; then
            echo "Repository variable SITE_BASE_URL is required." >&2
            exit 1
          fi

          cat > web/_config.dynamic.yml <<EOF
          url: "${SITE_BASE_URL}"
          EOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: true
          working-directory: web

      - name: Build site
        working-directory: web
        shell: bash
        run: |
          set -euo pipefail
          bundle exec jekyll build --config _config.yml,_config.dynamic.yml -d ../_site_web

      - name: Install rsync
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "${{ secrets.RSYNC_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.RSYNC_SSH_PORT || '22' }}" "${{ secrets.RSYNC_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync to server
        env:
          RSYNC_HOST: ${{ secrets.RSYNC_SSH_HOST }}
          RSYNC_USER: ${{ secrets.RSYNC_SSH_USER }}
          RSYNC_PORT: ${{ secrets.RSYNC_SSH_PORT || '22' }}
          RSYNC_PATH: ${{ secrets.RSYNC_SSH_PATH }}
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete -e "ssh -p ${RSYNC_PORT}" _site_web/ "${RSYNC_USER}@${RSYNC_HOST}:${RSYNC_PATH}/"
