report:
  status_labels:
    passed: PASS
    failed: FAIL

checks:
  - name: phpctl version exits successfully
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl version'
    expect:
      code: 0
      stdout:
        - op: contains
          value: "phpctl"

  - name: phpctl info returns valid json
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl --output json info'
    parser: json
    expect:
      code: 0
      json:
        - path: php_version
          op: exists
        - path: php_sapi
          op: exists
        - path: php_bin
          op: exists
        - path: loaded_ini
          op: exists
        - path: ini_scan_dir
          op: exists
        - path: extension_dir
          op: exists

  - name: php version matches expected branch
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl --output json info'
    parser: json
    expect:
      code: 0
      json:
        - path: php_version
          op: startswith
          value: "${PHP_MM}."

  - name: phpctl ext versions returns valid json
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'phpctl --output json ext versions'
    parser: json
    expect:
      code: 0

  - name: php binary reports expected branch
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'php -v'
    expect:
      code: 0
      stdout:
        - op: contains
          value: "PHP ${PHP_MM}."

  - name: php module list works
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'php -m'
    expect:
      code: 0
      stdout:
        - op: contains
          value: "Core"

  - name: alpine release is present
    cmd: docker run --rm "$IMAGE_TAG" sh -lc 'cat /etc/alpine-release'
    expect:
      code: 0
      stdout:
        - op: regex
          value: '^[0-9]+\.[0-9]+(\.[0-9]+)?$'

  - name: expected PECL extensions from pecl.txt are present
    cmd: |
      python3 - <<'PY'
      import json
      import os
      import subprocess
      import sys
      from pathlib import Path

      image = os.environ["IMAGE_TAG"]
      pecl_file = Path(os.environ["PECL_FILE"])

      expected = []
      if pecl_file.exists():
          for raw in pecl_file.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              expected.append(line)

      proc = subprocess.run(
          ["docker", "run", "--rm", image, "sh", "-lc", "phpctl --output json ext versions"],
          check=True,
          capture_output=True,
          text=True,
      )

      exts = json.loads(proc.stdout)
      actual = {}
      for row in exts:
          name = str(row.get("name") or "").strip()
          version = str(row.get("version") or "").strip()
          if name:
              actual[name.lower()] = version

      missing = [name for name in expected if name.lower() not in actual]

      print(f"expected={len(expected)}")
      print(f"missing={len(missing)}")

      if not expected:
          print("No expected PECL extensions listed in pecl.txt")
          raise SystemExit(0)

      for name in expected:
          key = name.lower()
          if key in actual:
              print(f"OK {name} {actual[key] or '-'}")
          else:
              print(f"MISSING {name}", file=sys.stderr)

      if missing:
          raise SystemExit(1)
      PY
    expect:
      code: 0
